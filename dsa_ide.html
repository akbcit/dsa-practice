<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSA Practice — Aditya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0f;
      --surface:   #111116;
      --surface2:  #18181f;
      --border:    #232329;
      --border2:   #2e2e38;
      --text:      #f0f0f5;
      --muted:     #71717a;
      --accent:    #8b5cf6;
      --accent2:   #a78bfa;
      --accentglow:rgba(139,92,246,0.25);
      --green:     #22c55e;
      --orange:    #f97316;
      --red:       #ef4444;
      --yellow:    #eab308;
      --cyan:      #06b6d4;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR ── */
    #topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 18px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
    }
    /* subtle purple top-line accent */
    #topbar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--cyan), var(--accent));
    }

    #topbar h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--accent2), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    #topbar select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      flex: 1;
      min-width: 0;
      transition: border-color 0.2s;
    }
    #topbar select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accentglow); }

    .topbar-btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      padding: 7px 13px;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .topbar-btn:hover { background: var(--border2); border-color: var(--accent); color: var(--accent2); }

    #btn-run {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff;
      border: none;
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
      box-shadow: 0 0 16px var(--accentglow);
    }
    #btn-run:hover { box-shadow: 0 0 24px rgba(139,92,246,0.45); transform: translateY(-1px); }
    #btn-run:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; }

    /* ── STATS STRIP ── */
    #stats-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 18px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
      font-size: 13px;
      color: var(--muted);
    }
    .strip-item { display: flex; align-items: center; gap: 7px; white-space: nowrap; }

    .strip-level {
      font-weight: 700;
      font-size: 13px;
      background: linear-gradient(135deg, var(--accent2), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .xp-bar-wrap {
      width: 90px; height: 6px;
      background: var(--border2);
      border-radius: 99px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
    }
    .xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px var(--accentglow);
    }
    .strip-xp   { color: var(--accent2); font-size: 12px; font-weight: 500; }
    .strip-streak{ color: var(--orange); font-weight: 600; }
    .strip-solved{ color: var(--green);  font-weight: 600; }
    .strip-timer { color: var(--cyan);   font-family: 'JetBrains Mono', monospace; font-size: 13px; }

    /* ── DIFFICULTY TAGS ── */
    .tag { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 600; letter-spacing: 0.3px; }
    .easy   { background: rgba(34,197,94,0.12);  color: var(--green);  border: 1px solid rgba(34,197,94,0.25); }
    .medium { background: rgba(234,179,8,0.12);  color: var(--yellow); border: 1px solid rgba(234,179,8,0.25); }
    .hard   { background: rgba(239,68,68,0.12);  color: var(--red);    border: 1px solid rgba(239,68,68,0.25); }

    /* ── MAIN LAYOUT ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── LEFT PANEL ── */
    #problem-panel {
      width: 38%; min-width: 280px;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #problem-content { flex: 1; overflow-y: auto; padding: 24px 22px; }
    #problem-content::-webkit-scrollbar { width: 4px; }
    #problem-content::-webkit-scrollbar-track { background: transparent; }
    #problem-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    #problem-content h2 {
      font-size: 20px; font-weight: 700; margin-bottom: 10px;
      color: var(--text); letter-spacing: -0.4px; line-height: 1.3;
    }
    #problem-content .meta {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 18px; font-size: 13px; color: var(--muted);
    }
    #problem-content p {
      font-size: 15px; line-height: 1.75; color: #b4b4c8; margin-bottom: 16px;
    }
    #problem-content p code, #problem-content li code {
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--accent2); padding: 1px 5px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
    }
    #problem-content h3 {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px;
    }
    .example {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
    }
    .example pre {
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      color: #b4b4c8; white-space: pre-wrap; line-height: 1.65;
    }
    .example .label {
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .constraint {
      font-size: 13px; color: var(--muted); margin: 5px 0;
      font-family: 'JetBrains Mono', monospace;
    }
    .hint-box {
      background: rgba(139,92,246,0.06);
      border: 1px solid rgba(139,92,246,0.2);
      border-left: 3px solid var(--accent);
      border-radius: 10px; padding: 12px 16px; margin-top: 18px;
      font-size: 14px; color: var(--muted); cursor: pointer;
      transition: background 0.2s;
    }
    .hint-box:hover { background: rgba(139,92,246,0.1); }
    .hint-box .hint-title { color: var(--accent2); font-weight: 600; margin-bottom: 4px; }
    .hint-body { display: none; color: #b4b4c8; margin-top: 8px; line-height: 1.6; }
    .hint-box.open .hint-body { display: block; }

    /* ── RIGHT PANEL ── */
    #editor-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #editor-container { flex: 1; overflow: hidden; }

    /* ── OUTPUT PANEL ── */
    #output-panel {
      height: 185px; background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    #output-tabs {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface); padding: 0 14px; align-items: center; height: 38px;
    }
    .out-tab {
      padding: 0 14px; height: 38px; display: flex; align-items: center;
      font-size: 13px; color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent; font-weight: 500;
    }
    .out-tab.active { color: var(--text); border-bottom-color: var(--accent); }

    #output-content {
      flex: 1; overflow-y: auto; padding: 14px 18px;
      font-family: 'JetBrains Mono', monospace; font-size: 13.5px; line-height: 1.65;
    }
    #output-content::-webkit-scrollbar { width: 4px; }
    #output-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    .out-success { color: var(--green); }
    .out-error   { color: var(--red); }
    .out-info    { color: var(--muted); }
    .out-stdout  { color: #b4b4c8; }
    .out-label   { color: var(--accent2); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

    #btn-mark-solved {
      margin-left: auto; margin-right: 8px;
      background: linear-gradient(135deg, #16a34a, var(--green));
      color: #fff; border: none; padding: 5px 14px; border-radius: 7px;
      font-size: 13px; font-family: 'Inter', sans-serif; font-weight: 600;
      cursor: pointer; display: none; transition: all 0.15s;
      box-shadow: 0 0 12px rgba(34,197,94,0.3);
    }
    #btn-mark-solved:hover { box-shadow: 0 0 20px rgba(34,197,94,0.5); transform: translateY(-1px); }
    #btn-mark-solved-always {
      margin-left: 6px; background: transparent; color: var(--green);
      border: 1px solid rgba(34,197,94,0.3); padding: 5px 11px;
      border-radius: 7px; font-size: 12px; font-family: 'Inter', sans-serif;
      cursor: pointer; opacity: 0.55; transition: all 0.15s;
    }
    #btn-mark-solved-always:hover { opacity: 1; border-color: var(--green); }

    /* ── CONFIDENCE ── */
    .conf-row { display: flex; align-items: center; gap: 5px; margin-left: 10px; }
    .conf-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .conf-btn {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 5px; padding: 3px 8px; font-size: 13px;
      cursor: pointer; transition: all 0.15s; opacity: 0.5;
    }
    .conf-btn:hover { opacity: 1; }
    .conf-btn.conf-active-1 { background: rgba(239,68,68,0.15); border-color: #ef4444; opacity: 1; }
    .conf-btn.conf-active-2 { background: rgba(234,179,8,0.15);  border-color: #eab308; opacity: 1; }
    .conf-btn.conf-active-3 { background: rgba(34,197,94,0.15);  border-color: #22c55e; opacity: 1; }

    /* ── RE-SOLVE TRACKING ── */
    #btn-cold {
      padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer; border: 1px dashed var(--border2);
      background: transparent; color: var(--muted); transition: all 0.15s;
    }
    #btn-cold:hover { color: #38bdf8; border-color: #38bdf8; }
    #btn-cold.cold-active { background: rgba(56,189,248,0.12); border-color: #38bdf8; border-style: solid; color: #38bdf8; }
    #solve-info { font-size: 11px; color: var(--muted); margin-left: 6px; white-space: nowrap; }
    #solve-info .si-attempts { color: var(--text); font-weight: 600; }
    #solve-info .si-due { color: #f97316; font-weight: 700; }
    #review-badge {
      display: inline-block; background: #f97316; color: #fff;
      font-size: 10px; font-weight: 700; border-radius: 10px;
      padding: 0 5px; margin-left: 4px; vertical-align: middle;
      font-family: 'Inter', sans-serif; line-height: 16px;
    }

    /* ── RESIZE HANDLE ── */
    #resize-handle { width: 3px; background: var(--border); cursor: col-resize; flex-shrink: 0; transition: background 0.2s; }
    #resize-handle:hover { background: var(--accent); }

    /* ── COPY TOAST ── */
    #toast {
      position: fixed; bottom: 80px; right: 24px;
      background: var(--surface2); border: 1px solid var(--green);
      color: var(--green); padding: 10px 18px; border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #toast.show { opacity: 1; }

    /* ── ACHIEVEMENT TOASTS ── */
    #achievement-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column-reverse; gap: 10px;
      z-index: 10000; pointer-events: none;
    }
    .ach-toast {
      background: rgba(18,18,26,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139,92,246,0.4);
      border-radius: 12px; padding: 14px 18px;
      min-width: 270px; max-width: 340px;
      transform: translateX(120%);
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(139,92,246,0.15);
    }
    .ach-toast.visible { transform: translateX(0); }
    .ach-toast-title { font-size: 11px; color: var(--accent2); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .ach-toast-body  { font-size: 15px; color: var(--text); margin-top: 3px; font-weight: 500; }

    /* ── CONFETTI ── */
    #confetti-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9998; overflow: hidden;
    }
    .confetti-piece {
      position: absolute; width: 9px; height: 9px; top: -20px;
      border-radius: 2px; animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

/* ── STATS MODAL ── */
    #stats-modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
      z-index: 10001; align-items: center; justify-content: center;
    }
    #stats-modal-bg.open { display: flex; }
    #stats-modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px; padding: 32px 36px;
      width: 580px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(139,92,246,0.1);
    }
    @keyframes modalIn {
      from { transform: scale(0.9) translateY(10px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);    opacity: 1; }
    }
    #stats-modal::-webkit-scrollbar { width: 4px; }
    #stats-modal::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .modal-header h2 { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.4px; }
    .modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 16px; cursor: pointer; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .modal-close:hover { color: var(--text); border-color: var(--border2); }

    .modal-section { margin-bottom: 24px; }
    .modal-section h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 14px; }

    .stat-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .stat-label { color: var(--muted); font-size: 14px; width: 150px; flex-shrink: 0; }
    .stat-val   { color: var(--text);  font-size: 14px; font-weight: 600; }
    .progress-bar { flex: 1; height: 7px; background: var(--border2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--cyan)); transition: width 0.5s; }
    .progress-fill.green { background: linear-gradient(90deg, #16a34a, var(--green)); }

    .pattern-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pattern-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; transition: border-color 0.2s; }
    .pattern-item:hover { border-color: var(--border2); }
    .pattern-item .pname  { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .pattern-item .pcount { font-size: 14px; color: var(--text); font-weight: 600; }

    .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .ach-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; transition: all 0.2s; }
    .ach-item.earned { border-color: rgba(139,92,246,0.5); background: rgba(139,92,246,0.06); box-shadow: 0 0 12px rgba(139,92,246,0.1); }
    .ach-item.locked { opacity: 0.4; }
    .ach-item .aicon  { font-size: 20px; }
    .ach-item .aname  { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 6px; }
    .ach-item .adesc  { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

    /* ── PLAY OVERLAY ── */
    #play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(12,12,15,0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-radius: 0;
      transition: opacity 0.3s;
    }
    #play-overlay.hidden { display: none; }
    #btn-play {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff;
      border: none;
      padding: 22px 44px;
      border-radius: 16px;
      font-size: 18px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 40px var(--accentglow), 0 8px 32px rgba(0,0,0,0.5);
      transition: all 0.2s;
      letter-spacing: -0.2px;
    }
    #btn-play:hover {
      transform: scale(1.05);
      box-shadow: 0 0 60px rgba(139,92,246,0.5), 0 12px 40px rgba(0,0,0,0.6);
    }
    #btn-play .play-icon { font-size: 36px; line-height: 1; }
    #btn-play .play-sub  { font-size: 13px; font-weight: 400; opacity: 0.75; }

    /* ── ATTEMPT BAR ── */
    #attempt-bar {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 10px; background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; flex-wrap: wrap;
    }
    #attempt-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .attempt-tab {
      padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer; border: 1px solid var(--border2);
      background: var(--surface2); color: var(--muted); transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .attempt-tab:hover { color: var(--text); border-color: var(--accent); }
    .attempt-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .attempt-tab-del {
      font-size: 11px; opacity: 0.4; line-height: 1; cursor: pointer;
      padding: 0 1px; border-radius: 3px; transition: opacity 0.15s;
    }
    .attempt-tab-del:hover { opacity: 1; color: #ef4444; }
    .attempt-tab.active .attempt-tab-del { opacity: 0.6; color: #fff; }
    .attempt-tab.active .attempt-tab-del:hover { opacity: 1; color: #fca5a5; }
    #btn-new-attempt {
      padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer; border: 1px dashed var(--border2);
      background: transparent; color: var(--muted); transition: all 0.15s; margin-left: 2px;
    }
    #btn-new-attempt:hover { color: var(--accent); border-color: var(--accent); }

    /* haze state — applied to editor panel when not started */
    #editor-panel.hazed { pointer-events: none; }
    #play-overlay, #btn-play { pointer-events: auto; }
    #editor-panel.hazed #editor-container { opacity: 0.25; filter: blur(2px); transition: opacity 0.3s, filter 0.3s; }
    #editor-panel.hazed #output-panel     { opacity: 0.25; filter: blur(2px); transition: opacity 0.3s, filter 0.3s; }
    #btn-run.hazed, .topbar-btn.hazed     { opacity: 0.3; pointer-events: none; }
    #editor-panel { position: relative; }

    /* ── PLAYLIST ── */
    .playlist-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
    .playlist-header { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

    .playlist-items { display: flex; flex-direction: column; gap: 6px; }
    .playlist-item { display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 6px 8px 6px 6px; transition: border-color 0.15s; }
    .playlist-item:hover { border-color: var(--border2); }
    .playlist-thumb { width: 72px; height: 41px; border-radius: 5px; object-fit: cover; background: var(--border2); flex-shrink: 0; cursor: pointer; transition: opacity 0.15s; display: block; }

    .playlist-info { flex: 1; min-width: 0; }
    .playlist-title { font-size: 12px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; line-height: 1.35; }

    .playlist-loading { font-size: 11px; color: var(--accent2); padding: 2px 0; }

    .guide-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); padding-bottom: 32px; }
    .guide-header { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }

  </style>
</head>

        for(int i=0;i<adj.Length;i++)

const LEVEL_NAMES = ['', 'Rookie', 'Apprentice', 'Developer', 'Intermediate', 'Senior', 'Expert', 'Legend'];

// ─── STATE ───────────────────────────────────────────────────────────────────
let editor = null;
let currentIdx = 0;
let currentProblem = PROBLEMS[0];
let currentAttempt = 1; // 1-based
let hintOpened = false;
let timerStart = Date.now();
let timerInterval = null;
let achievementQueue = [];
let achievementBusy = false;
let lastRunHadOutput = false;

// ─── STORAGE HELPERS ─────────────────────────────────────────────────────────
function getSolved()     { try { return JSON.parse(localStorage.getItem('dsa_solved') || '[]'); } catch(e) { return []; } }
function getConfidenceMap() { try { return JSON.parse(localStorage.getItem('dsa_confidence') || '{}'); } catch { return {}; } }
function getConfidence(pid) { return getConfidenceMap()[pid] || 0; }
function setConfidence(level) {
  const pid = currentProblem.id;
  const map = getConfidenceMap();
  map[pid] = level;
  localStorage.setItem('dsa_confidence', JSON.stringify(map));
  // Log as re-solve if a new attempt was started on an already-solved problem
  if (isResolvePending) {
    addResolveProblem(pid, coldSolveMode, level);
    isResolvePending = false;
    coldSolveMode = false;
    const btn = document.getElementById('btn-cold');
    if (btn) { btn.style.display = 'none'; btn.classList.remove('cold-active'); }
    showCopyToast('Re-solve logged!', '#22c55e');
  }
  renderConfidenceBtns(pid);
  renderSolveInfo(pid);
  updateReviewBtnBadge();
  buildDropdown();
  scheduleSyncToFile();
}
function renderConfidenceBtns(pid) {
  const level = getConfidence(pid);
  [1,2,3].forEach(n => {
    const btn = document.getElementById('conf-' + n);
    if (btn) { btn.classList.toggle('conf-active-' + n, level === n); }
  });
}
function goNextShaky() {
  const map = getConfidenceMap();
  for (let i = 1; i <= PROBLEMS.length; i++) {
    const idx = (currentIdx + i) % PROBLEMS.length;
    const p = PROBLEMS[idx];
    if (map[p.id] === 1) {
      document.getElementById('problem-select').value = idx;
      loadProblem(idx);
      return;
    }
  }
  showCopyToast('No shaky problems — nice!', '#22c55e');
}

// ─── RE-SOLVE TRACKING ────────────────────────────────────────────────────────
function getResolves() { try { return JSON.parse(localStorage.getItem('dsa_re_solves') || '{}'); } catch { return {}; } }
function getResolvesFor(pid) { return (getResolves()[pid] || []); }
function getSolveCount(pid) {
  if (!getSolved().includes(pid)) return 0;
  return 1 + getResolvesFor(pid).length;
}
function addResolveProblem(pid, cold, conf) {
  const all = getResolves();
  if (!all[pid]) all[pid] = [];
  all[pid].push({ date: new Date().toISOString().slice(0, 10), cold, conf });
  localStorage.setItem('dsa_re_solves', JSON.stringify(all));
  scheduleSyncToFile();
}
function getInitialSolveDate(pid) {
  const dates = getSolveDates();
  for (const [date, pids] of Object.entries(dates)) {
    if (pids.includes(pid)) return date;
  }
  return null;
}
function getLastActivityDate(pid) {
  const resolves = getResolvesFor(pid);
  if (resolves.length > 0) return resolves[resolves.length - 1].date;
  return getInitialSolveDate(pid);
}
function daysSince(dateStr) {
  if (!dateStr) return 999;
  return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
}
function getDueProblems() {
  return getSolved().filter(pid => daysSince(getLastActivityDate(pid)) >= 10);
}

let coldSolveMode = false;
let isResolvePending = false;

function toggleColdSolve() {
  coldSolveMode = !coldSolveMode;
  const btn = document.getElementById('btn-cold');
  if (btn) btn.classList.toggle('cold-active', coldSolveMode);
}

function renderSolveInfo(pid) {
  const el = document.getElementById('solve-info');
  const btn = document.getElementById('btn-cold');
  if (!el) return;
  const count = getSolveCount(pid);
  if (count === 0) { el.innerHTML = ''; if (btn) btn.style.display = 'none'; return; }
  const last = getLastActivityDate(pid);
  const days = daysSince(last);
  const daysStr = days === 0 ? 'today' : days === 1 ? '1 day ago' : `${days} days ago`;
  const due = days >= 10;
  el.innerHTML = `<span class="si-attempts">${count}x solved</span> &bull; last: ${daysStr}${due ? ' <span class="si-due">&bull; due!</span>' : ''}`;
  if (btn) btn.style.display = isResolvePending ? '' : 'none';
}

function updateReviewBtnBadge() {
  const badge = document.getElementById('review-badge');
  if (!badge) return;
  const dueIds = new Set(getDueProblems().map(String));
  const shakyIds = new Set(Object.entries(getConfidenceMap()).filter(([,v]) => v === 1).map(([k]) => k));
  const total = new Set([...dueIds, ...shakyIds]).size;
  if (total > 0) { badge.textContent = total; badge.style.display = 'inline-block'; }
  else { badge.style.display = 'none'; }
}

function goNextDue() {
  const dueIds = new Set(getDueProblems().map(String));
  const shakyIds = new Set(Object.entries(getConfidenceMap()).filter(([,v]) => v === 1).map(([k]) => k));
  const needReview = new Set([...dueIds, ...shakyIds]);
  for (let i = 1; i <= PROBLEMS.length; i++) {
    const idx = (currentIdx + i) % PROBLEMS.length;
    const p = PROBLEMS[idx];
    if (needReview.has(String(p.id))) {
      document.getElementById('problem-select').value = idx;
      loadProblem(idx);
      return;
    }
  }
  showCopyToast('All caught up — nothing due! \u{1F3AF}', '#22c55e');
}

function getSolveDates() { try { return JSON.parse(localStorage.getItem('dsa_solve_dates') || '{}'); } catch(e) { return {}; } }
function addSolveDate(pid) {
  const today = new Date().toISOString().slice(0, 10);
  const dates = getSolveDates();
  if (!dates[today]) dates[today] = [];
  if (!dates[today].includes(pid)) { dates[today].push(pid); localStorage.setItem('dsa_solve_dates', JSON.stringify(dates)); scheduleSyncToFile(); }
}
function getXP()       { return parseInt(localStorage.getItem('dsa_xp') || '0', 10); }
function getStreak()   { return parseInt(localStorage.getItem('dsa_streak_count') || '0', 10); }
function getAchs()     { try { return JSON.parse(localStorage.getItem('dsa_achievements') || '[]'); } catch(e) { return []; } }
function getBestTime() { return parseInt(localStorage.getItem('dsa_best_time') || '0', 10); }

function addSolved(pid) {
  const s = getSolved();
  if (!s.includes(pid)) { s.push(pid); localStorage.setItem('dsa_solved', JSON.stringify(s)); scheduleSyncToFile(); }
}
function addXP(amount) {
  const xp = getXP() + amount;
  localStorage.setItem('dsa_xp', xp);
  scheduleSyncToFile();
  return xp;
}
function addAch(id) {
  const a = getAchs();
  if (!a.includes(id)) { a.push(id); localStorage.setItem('dsa_achievements', JSON.stringify(a)); scheduleSyncToFile(); return true; }
  return false;
}
function setBestTime(secs) {
  const cur = getBestTime();
  if (cur === 0 || secs < cur) { localStorage.setItem('dsa_best_time', secs); scheduleSyncToFile(); }
}
function updateStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const lastDate = localStorage.getItem('dsa_streak_date') || '';
  let streak = getStreak();
  if (lastDate === today) return streak;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (lastDate === yesterday) { streak += 1; }
  else { streak = 1; }
  localStorage.setItem('dsa_streak_count', streak);
  localStorage.setItem('dsa_streak_date', today);
  scheduleSyncToFile();
  return streak;
}

// ─── FILE SYNC (via local server) ─────────────────────────────────────────────
const FILE_SYNC = location.hostname === 'localhost';
let _syncTimer = null;

function collectAllProgress() {
  const code = {}, videos = {}, guides = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('dsa_code_'))   code[k.slice(9)]    = localStorage.getItem(k);
    if (k && k.startsWith('dsa_videos_')) videos[k.slice(11)] = localStorage.getItem(k);
    if (k && k.startsWith('dsa_guide_'))  guides[k.slice(10)] = localStorage.getItem(k);
  }
  return {
    solved:       getSolved(),
    solve_dates:  getSolveDates(),
    xp:           getXP(),
    streak_count: getStreak(),
    streak_date:  localStorage.getItem('dsa_streak_date') || '',
    achievements: getAchs(),
    best_time:    getBestTime(),
    confidence:   getConfidenceMap(),
    re_solves:    getResolves(),
    code,
    videos,
    guides,
  };
}

function scheduleSyncToFile() {
  if (!FILE_SYNC) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncToFile, 5000); // debounce: write 5s after last change
}

async function syncToFile() {
  if (!FILE_SYNC) return;
  try {
    await fetch('/progress', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(collectAllProgress()),
    });
  } catch (_) {}
}

async function loadFromFile() {
  if (!FILE_SYNC) return;
  try {
    const res = await fetch('/progress');
    if (!res.ok) return;
    const d = await res.json();
    if (!d || !d.solved) return; // empty file — nothing to restore

    // Restore into localStorage (file wins over stale localStorage)
    if (d.solved)       localStorage.setItem('dsa_solved',        JSON.stringify(d.solved));
    if (d.solve_dates)  localStorage.setItem('dsa_solve_dates',   JSON.stringify(d.solve_dates));
    if (d.xp != null)   localStorage.setItem('dsa_xp',            d.xp);
    if (d.streak_count) localStorage.setItem('dsa_streak_count',  d.streak_count);
    if (d.streak_date)  localStorage.setItem('dsa_streak_date',   d.streak_date);
    if (d.achievements) localStorage.setItem('dsa_achievements',  JSON.stringify(d.achievements));
    if (d.best_time)    localStorage.setItem('dsa_best_time',     d.best_time);
    if (d.code) {
      for (const [k, v] of Object.entries(d.code)) {
        localStorage.setItem('dsa_code_' + k, v);
      }
    }
    if (d.videos) {
      for (const [k, v] of Object.entries(d.videos)) {
        localStorage.setItem('dsa_videos_' + k, v);
      }
    }
    if (d.guides) {
      for (const [k, v] of Object.entries(d.guides)) {
        localStorage.setItem('dsa_guide_' + k, v);
      }
    }
    if (d.confidence) {
      localStorage.setItem('dsa_confidence', JSON.stringify(d.confidence));
    }
    if (d.re_solves) {
      localStorage.setItem('dsa_re_solves', JSON.stringify(d.re_solves));
    }
  } catch (_) {}
}

function getLevel(xp) {
  return Math.min(7, Math.floor(xp / 100) + 1);
}
function getLevelName(lv) {
  return LEVEL_NAMES[Math.min(lv, 7)] || 'Legend';
}

// ─── STATS STRIP ─────────────────────────────────────────────────────────────
function updateStrip() {
  const xp    = getXP();
  const lv    = getLevel(xp);
  const lvXP  = (lv - 1) * 100;
  const nextXP= lv >= 7 ? 100 : 100;
  const pct   = Math.min(100, ((xp - lvXP) / nextXP) * 100);
  const solved = getSolved().length;
  const streak = getStreak();

  document.getElementById('strip-level').textContent   = `Lv.${lv} ${getLevelName(lv)}`;
  document.getElementById('strip-xp-bar').style.width  = pct + '%';
  document.getElementById('strip-xp-text').textContent = `${xp - lvXP}/${nextXP} XP`;
  document.getElementById('strip-streak').textContent  = `\uD83D\uDD25 ${streak} day streak`;
  document.getElementById('strip-solved').textContent  = `\u2713 ${solved} / ${PROBLEMS.length} solved`;

  // Update next-unsolved button label
  const nextIdx = findNextUnsolved();
  const btn = document.getElementById('btn-next');
  if (nextIdx === -1) {
    btn.textContent = 'All Done! \uD83C\uDF89';
  } else {
    btn.textContent = 'Next Unsolved \u2192';
  }
}

// ─── TIMER ───────────────────────────────────────────────────────────────────
function startTimer() {
  timerStart = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - timerStart) / 1000);
    const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const ss = String(elapsed % 60).padStart(2, '0');
    document.getElementById('strip-timer').textContent = `\u23F1 ${mm}:${ss}`;
  }, 1000);
}
function getElapsedSecs() {
  return Math.floor((Date.now() - timerStart) / 1000);
}

// ─── DROPDOWN ────────────────────────────────────────────────────────────────
function buildDropdown() {
  const sel = document.getElementById('problem-select');
  const solved = getSolved();
  sel.innerHTML = '';
  const confMap = getConfidenceMap();
  PROBLEMS.forEach((p, i) => {
    const opt = document.createElement('option');
    const isSolved = solved.includes(p.id);
    const check = isSolved ? '\u2713 ' : '';
    const diff = p.difficulty.charAt(0).toUpperCase() + p.difficulty.slice(1);
    const confEmoji = confMap[p.id] === 1 ? '😕 ' : confMap[p.id] === 2 ? '🤔 ' : confMap[p.id] === 3 ? '💪 ' : '';
    opt.value = i;
    opt.textContent = `${check}${confEmoji}${p.id}. ${p.title} \u2014 ${diff}`;
    if (isSolved) opt.style.color = '#3fb950';
    sel.appendChild(opt);
  });
  sel.value = currentIdx;
}

// ─── ATTEMPTS ────────────────────────────────────────────────────────────────
function attemptKey(id, n) { return `dsa_code_${id}_a${n}`; }

function getAttemptCount(id) {
  // Find highest attempt that exists, minimum 1
  let n = 1;
  while (localStorage.getItem(attemptKey(id, n + 1)) !== null) n++;
  return n;
}

function renderAttemptTabs(id) {
  const tabs = document.getElementById('attempt-tabs');
  const total = getAttemptCount(id);
  tabs.innerHTML = '';
  for (let i = 1; i <= total; i++) {
    const t = document.createElement('div');
    t.className = 'attempt-tab' + (i === currentAttempt ? ' active' : '');
    const label = document.createElement('span');
    label.textContent = `Attempt ${i}`;
    label.onclick = () => switchAttempt(i);
    t.appendChild(label);
    if (total > 1) {
      const del = document.createElement('span');
      del.className = 'attempt-tab-del';
      del.textContent = '✕';
      del.title = 'Delete this attempt';
      del.onclick = (e) => { e.stopPropagation(); deleteAttempt(id, i); };
      t.appendChild(del);
    }
    tabs.appendChild(t);
  }
}

function deleteAttempt(id, n) {
  const total = getAttemptCount(id);
  if (total <= 1) return; // never delete the only attempt
  // Remove this attempt's key
  localStorage.removeItem(attemptKey(id, n));
  // Shift all higher attempts down by one
  for (let i = n + 1; i <= total; i++) {
    const val = localStorage.getItem(attemptKey(id, i));
    if (val !== null) localStorage.setItem(attemptKey(id, i - 1), val);
    localStorage.removeItem(attemptKey(id, i));
  }
  // Land on a valid attempt
  currentAttempt = Math.min(currentAttempt, total - 1);
  renderAttemptTabs(id);
  const saved = localStorage.getItem(attemptKey(id, currentAttempt));
  if (editor) {
    editor.setValue(saved !== null ? saved : currentProblem.starterCode);
    monaco.editor.setModelMarkers(editor.getModel(), 'cs-lint', []);
  }
}

function switchAttempt(n) {
  // Save current before switching
  if (editor) localStorage.setItem(attemptKey(currentProblem.id, currentAttempt), editor.getValue());
  currentAttempt = n;
  renderAttemptTabs(currentProblem.id);
  const saved = localStorage.getItem(attemptKey(currentProblem.id, n));
  editor.setValue(saved !== null ? saved : currentProblem.starterCode);
  monaco.editor.setModelMarkers(editor.getModel(), 'cs-lint', []);
}

function newAttempt() {
  // Save current attempt first
  if (editor) localStorage.setItem(attemptKey(currentProblem.id, currentAttempt), editor.getValue());
  const total = getAttemptCount(currentProblem.id);
  const next = total + 1;
  // Pre-save so getAttemptCount finds it
  localStorage.setItem(attemptKey(currentProblem.id, next), currentProblem.starterCode);
  currentAttempt = next;
  renderAttemptTabs(currentProblem.id);
  editor.setValue(currentProblem.starterCode);
  monaco.editor.setModelMarkers(editor.getModel(), 'cs-lint', []);
  editor.focus();
  // If already solved, mark as re-solve pending so confidence sets log it
  if (getSolved().includes(currentProblem.id)) {
    isResolvePending = true;
    coldSolveMode = false;
    const btn = document.getElementById('btn-cold');
    if (btn) { btn.style.display = ''; btn.classList.remove('cold-active'); }
    renderSolveInfo(currentProblem.id);
    showCopyToast('Re-solve started! Set confidence when done.', '#38bdf8');
  }
}

// ─── LOAD PROBLEM ────────────────────────────────────────────────────────────
function loadProblem(idx) {
  currentIdx = parseInt(idx);
  currentProblem = PROBLEMS[currentIdx];
  localStorage.setItem('dsa_last_problem', currentIdx);
  hintOpened = false;
  lastRunHadOutput = false;
  renderProblem(currentProblem);
  renderConfidenceBtns(currentProblem.id);
  // Reset re-solve state on problem switch
  isResolvePending = false;
  coldSolveMode = false;
  const _coldBtn = document.getElementById('btn-cold');
  if (_coldBtn) _coldBtn.classList.remove('cold-active');
  renderSolveInfo(currentProblem.id);
  updateReviewBtnBadge();
  if (editor) {
    // Migrate old dsa_code_<id> key to attempt 1 if needed
    const oldKey = 'dsa_code_' + currentProblem.id;
    const oldVal = localStorage.getItem(oldKey);
    if (oldVal !== null && localStorage.getItem(attemptKey(currentProblem.id, 1)) === null) {
      localStorage.setItem(attemptKey(currentProblem.id, 1), oldVal);
      localStorage.removeItem(oldKey);
    }
    currentAttempt = getAttemptCount(currentProblem.id);
    renderAttemptTabs(currentProblem.id);
    const saved = localStorage.getItem(attemptKey(currentProblem.id, currentAttempt));
    editor.setValue(saved !== null ? saved : currentProblem.starterCode);
    monaco.editor.setModelMarkers(editor.getModel(), 'cs-lint', []);
    if (window._scheduleLint) window._scheduleLint();
  }
  document.getElementById('output-content').innerHTML = '<span class="out-info">Click ▶ Start Problem to begin...</span>';
  document.getElementById('btn-mark-solved').style.display = 'none';
  buildDropdown();
  // Stop any running timer and reset to ready state
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('strip-timer').textContent = '⏱ 00:00';
  // Skip play overlay for already-solved problems
  const alreadySolved = getSolved().includes(currentProblem.id);
  if (alreadySolved) {
    document.getElementById('play-overlay').classList.add('hidden');
    document.getElementById('editor-panel').classList.remove('hazed');
    document.getElementById('btn-run').classList.remove('hazed');
    document.getElementById('output-content').innerHTML = '<span class="out-info">Click "Run Code" to execute your solution...</span>';
  } else {
    document.getElementById('play-overlay').classList.remove('hidden');
    document.getElementById('editor-panel').classList.add('hazed');
    document.getElementById('btn-run').classList.add('hazed');
  }
  updateStrip();
}

function startProblem() {
  document.getElementById('play-overlay').classList.add('hidden');
  document.getElementById('editor-panel').classList.remove('hazed');
  document.getElementById('btn-run').classList.remove('hazed');
  document.getElementById('output-content').innerHTML = '<span class="out-info">Click "Run Code" to execute your solution...</span>';
  startTimer();
  if (editor) { editor.focus(); editor.layout(); }
}

function renderProblem(p) {
  const diffClass = p.difficulty;
  const diffLabel = p.difficulty.charAt(0).toUpperCase() + p.difficulty.slice(1);
  const solved = getSolved();
  const isSolved = solved.includes(p.id);

  let html = `
    <h2>${p.id}. ${p.title}${isSolved ? ' <span style="color:#3fb950;font-size:14px;">\u2713 Solved</span>' : ''}</h2>
    <div class="meta">
      <span class="tag ${diffClass}">${diffLabel}</span>
      <span>Pattern: ${p.pattern}</span>
    </div>
    <p>${p.description}</p>
    <h3>Examples</h3>
  `;

  p.examples.forEach((ex, i) => {
    html += `<div class="example">
      <div class="label">Example ${i + 1}</div>
      <pre><strong>Input:</strong>  ${ex.input}
<strong>Output:</strong> ${ex.output}${ex.explanation ? '\n<strong>Explanation:</strong> ' + ex.explanation : ''}</pre>
    </div>`;
  });

  html += `<h3>Constraints</h3>`;
  p.constraints.forEach(c => { html += `<div class="constraint">&bull; ${c}</div>`; });

  html += `<div class="hint-box" onclick="toggleHint(this)">
    <div class="hint-title">Hint (click to reveal)</div>
    <div class="hint-body">${p.hint}</div>
  </div>`;

  html += `
  <div class="playlist-section">
    <div class="playlist-header">&#127910; Resources</div>
    <div class="playlist-add">
      <input id="playlist-url-input" type="text" placeholder="Paste a YouTube URL…" onkeydown="if(event.key==='Enter')addVideo()" />
      <button onclick="addVideo()">+ Add</button>
    </div>
    <div id="playlist-items"></div>
  </div>`;

  html += `
  <div class="guide-section">
    <div class="guide-header">
      <span>&#128221; My Guide</span>
      <button class="guide-edit-btn" id="guide-edit-btn" onclick="toggleGuideEdit()">Edit</button>
    </div>
    <div id="guide-view"></div>
    <textarea id="guide-textarea" class="guide-textarea" placeholder="Write your guide, notes, or approach here…&#10;&#10;Supports basic markdown:&#10;### Heading&#10;**bold**&#10;\`code\`&#10;- bullet&#10;| table | cells |" oninput="scheduleSaveGuide()"></textarea>
  </div>`;

  document.getElementById('problem-content').innerHTML = html;
  renderPlaylist(p.id);
  renderGuide(p.id);
}

function toggleHint(el) {
  el.classList.toggle('open');
  if (el.classList.contains('open')) hintOpened = true;
}

// ─── YOUTUBE PLAYLIST ────────────────────────────────────────────────────────
function videosKey(pid) { return `dsa_videos_${pid}`; }
function getVideos(pid) {
  try { return JSON.parse(localStorage.getItem(videosKey(pid))) || []; }
  catch { return []; }
}
function saveVideos(pid, arr) {
  localStorage.setItem(videosKey(pid), JSON.stringify(arr));
  scheduleSyncToFile();
}

function ytId(url) {
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|v\/))([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openVideo(pid, idx) {
  const vids = getVideos(pid);
  if (vids[idx]) window.open(vids[idx].url, '_blank', 'noopener');
}

function removeVideo(pid, idx) {
  const vids = getVideos(pid);
  vids.splice(idx, 1);
  saveVideos(pid, vids);
  renderPlaylist(pid);
}

async function addVideo() {
  const input = document.getElementById('playlist-url-input');
  if (!input) return;
  const url = input.value.trim();
  if (!url) return;
  const vid = ytId(url);
  if (!vid) {
    input.style.borderColor = 'var(--red)';
    setTimeout(() => { input.style.borderColor = ''; }, 1200);
    return;
  }
  input.value = '';
  const pid = currentProblem.id;
  const vids = getVideos(pid);
  vids.push({ url, videoId: vid, title: '', channel: '' });
  saveVideos(pid, vids);
  renderPlaylist(pid);

  // Fetch title from oEmbed (CORS-friendly)
  try {
    const res = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
    if (res.ok) {
      const data = await res.json();
      const latest = getVideos(pid);
      const entry = latest.find(v => v.videoId === vid && !v.title);
      if (entry) {
        entry.title   = data.title        || '';
        entry.channel = data.author_name  || '';
        saveVideos(pid, latest);
        renderPlaylist(pid);
      }
    }
  } catch (_) {}
}

function renderPlaylist(pid) {
  const container = document.getElementById('playlist-items');
  if (!container) return;
  const videos = getVideos(pid);
  if (!videos.length) {
    container.innerHTML = '<div class="playlist-empty">No videos added — paste a YouTube URL above.</div>';
    return;
  }
  container.innerHTML = videos.map((v, i) => `
    <div class="playlist-item">
      <img class="playlist-thumb"
           src="https://img.youtube.com/vi/${escHtml(v.videoId)}/mqdefault.jpg"
           onerror="this.style.visibility='hidden'"
           onclick="openVideo(${pid},${i})" />
      <div class="playlist-info">
        <div class="playlist-title" onclick="openVideo(${pid},${i})">${escHtml(v.title || v.url)}</div>
        ${v.channel ? `<div class="playlist-ch">${escHtml(v.channel)}</div>` : ''}
      </div>
      <button class="playlist-del" onclick="removeVideo(${pid},${i})" title="Remove">&#215;</button>
    </div>
  `).join('');
}

function guideKey(pid) { return `dsa_guide_${pid}`; }
function getGuide(pid) { return localStorage.getItem(guideKey(pid)) || ''; }
function saveGuide(pid, text) {

}

let _guideTimer = null;
function scheduleSaveGuide() {
  clearTimeout(_guideTimer);
  _guideTimer = setTimeout(() => {
    const ta = document.getElementById('guide-textarea');
    if (ta) saveGuide(currentProblem.id, ta.value);
  }, 800);
}

function toggleGuideEdit() {
  const ta  = document.getElementById('guide-textarea');
  const btn = document.getElementById('guide-edit-btn');
  const view = document.getElementById('guide-view');
  if (!ta) return;
  const editing = ta.style.display !== 'none';
  if (editing) {
    // save and switch to view
    saveGuide(currentProblem.id, ta.value);
    ta.style.display = 'none';
    btn.textContent = 'Edit';
    btn.classList.remove('active');
    renderGuideView(ta.value);
  } else {
    ta.style.display = 'block';
    ta.value = getGuide(currentProblem.id);
    ta.focus();
    btn.textContent = 'Save';
    btn.classList.add('active');
    if (view) view.innerHTML = '';
  }
}

function renderGuide(pid) {
  const ta   = document.getElementById('guide-textarea');
  const btn  = document.getElementById('guide-edit-btn');
  if (!ta || !btn) return;
  const text = getGuide(pid);
  ta.style.display = 'none';
  btn.textContent = 'Edit';
  btn.classList.remove('active');
  renderGuideView(text);
}

function renderGuideView(md) {
  const view = document.getElementById('guide-view');
  if (!view) return;
  if (!md.trim()) { view.innerHTML = ''; return; }
  view.innerHTML = mdToHtml(md);
}

function mdToHtml(md) {
  // fenced code blocks first (preserve newlines)
  const blocks = [];
  md = md.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => {
    const i = blocks.length;
    blocks.push(`<pre><code>${escHtml(code.replace(/\n$/, ''))}</code></pre>`);
    return `\x00BLOCK${i}\x00`;
  });

  // inline code
  md = md.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);

  // tables (must come before line processing)
  md = md.replace(/((?:\|.+\|\n?)+)/g, (table) => {
    const rows = table.trim().split('\n').filter(r => r.trim());
    if (rows.length < 2) return table;
    const isSep = r => /^\|[\s\-|:]+\|$/.test(r.trim());
    let html = '<table>';
    let inBody = false;
    rows.forEach((row, ri) => {
      if (isSep(row)) { inBody = true; return; }
      const tag = (!inBody && ri === 0) ? 'th' : 'td';
      const cells = row.replace(/^\||\|$/g,'').split('|').map(c => c.trim());
      html += '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
    });
    return html + '</table>';
  });

  // headings, hr, bold, lists — line by line
  const lines = md.split('\n');
  const out = [];
  let inList = false;
  for (const raw of lines) {
    let line = raw;
    // headings
    if (/^### (.+)/.test(line)) { if(inList){out.push('</ul>');inList=false;} out.push(`<h3>${line.slice(4)}</h3>`); continue; }
    if (/^## (.+)/.test(line))  { if(inList){out.push('</ul>');inList=false;} out.push(`<h2>${line.slice(3)}</h2>`); continue; }
    if (/^# (.+)/.test(line))   { if(inList){out.push('</ul>');inList=false;} out.push(`<h2>${line.slice(2)}</h2>`); continue; }
    if (/^---+$/.test(line.trim())) { if(inList){out.push('</ul>');inList=false;} out.push('<hr>'); continue; }
    // list items
    if (/^[-*] (.+)/.test(line)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push(`<li>${applyInline(line.slice(2))}</li>`); continue;
    }
    if (inList) { out.push('</ul>'); inList = false; }
    // table placeholder passthrough
    if (line.includes('\x00BLOCK')) { out.push(line); continue; }
    if (/^<table>/.test(line))  { out.push(line); continue; }
    if (/^<\/table>/.test(line)){ out.push(line); continue; }
    if (/^<tr>/.test(line))     { out.push(line); continue; }
    // blank line
    if (!line.trim()) { out.push('<p></p>'); continue; }
    out.push(`<p>${applyInline(line)}</p>`);
  }
  if (inList) out.push('</ul>');

  let html = out.join('\n');
  // restore code blocks
  blocks.forEach((b, i) => { html = html.replace(`\x00BLOCK${i}\x00`, b); });
  return html;
}

function applyInline(s) {
  // bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // already-converted <code> tags are safe, raw backticks handled before
  return s;
}

// ─── NEXT UNSOLVED ───────────────────────────────────────────────────────────
function findNextUnsolved() {
  const solved = getSolved();
  for (let i = 1; i <= PROBLEMS.length; i++) {
    const idx = (currentIdx + i) % PROBLEMS.length;
    if (!solved.includes(PROBLEMS[idx].id)) return idx;
  }
  return -1;
}
function goNextUnsolved() {
  const next = findNextUnsolved();
  if (next === -1) return;
  document.getElementById('problem-select').value = next;
  loadProblem(next);
}
function goHome() {
  const first = findNextUnsolved();
  const idx = first !== -1 ? first : 0;
  document.getElementById('problem-select').value = idx;
  loadProblem(idx);
}

function resetCode() {
  if (confirm('Restore starter code for this attempt? Your current code will be lost.')) {
    localStorage.removeItem(attemptKey(currentProblem.id, currentAttempt));
    editor.setValue(currentProblem.starterCode);
  }
}

// ─── MARK AS SOLVED ──────────────────────────────────────────────────────────
function markSolved() {
  const pid = currentProblem.id;
  const solved = getSolved();
  if (solved.includes(pid)) {
    // If a re-solve attempt is in progress, log it and prompt for confidence
    if (isResolvePending) {
      addResolveProblem(pid, coldSolveMode, getConfidence(pid) || 2);
      isResolvePending = false;
      coldSolveMode = false;
      const btn = document.getElementById('btn-cold');
      if (btn) { btn.style.display = 'none'; btn.classList.remove('cold-active'); }
      renderSolveInfo(pid);
      updateReviewBtnBadge();
      showCopyToast('Re-solve logged! Update confidence below.', '#22c55e');
    } else {
      showCopyToast('Already solved — use + New Attempt to re-solve', '#58a6ff');
    }
    return;
  }

  const elapsed = getElapsedSecs();

  // XP calculation
  const xpMap = { easy: 10, medium: 20, hard: 30 };
  let xpGain = xpMap[currentProblem.difficulty] || 10;
  if (hintOpened) xpGain = Math.max(0, xpGain - 3);

  addSolved(pid);
  addSolveDate(pid);
  const newXP = addXP(xpGain);
  const newStreak = updateStreak();
  setBestTime(elapsed);

  // Update strip
  updateStrip();
  buildDropdown();
  renderProblem(currentProblem);

  // Elapsed time display
  const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const ss = String(elapsed % 60).padStart(2, '0');

  // Show success in output
  const out = document.getElementById('output-content');
  const hintNote = hintOpened ? ' <span style="color:#d29922">(hint used: -3 XP)</span>' : '';
  out.innerHTML = `
    <div class="out-label">SOLVED!</div>
    <div class="out-success" style="font-size:15px;margin-bottom:8px;">\u2713 Problem marked as solved!</div>
    <div class="out-info">+${xpGain} XP${hintNote} &bull; Time: ${mm}:${ss} &bull; Streak: ${newStreak} day(s)</div>
  `;
  document.getElementById('btn-mark-solved').style.display = 'none';

  // Confetti
  fireConfetti();

  // Check achievements
  checkAchievements(elapsed, newStreak);

  // Auto-advance to next unsolved after a short delay
  setTimeout(() => {
    const next = findNextUnsolved();
    if (next !== -1) {
      document.getElementById('problem-select').value = next;
      loadProblem(next);
    }
  }, 2000);
}

// ─── ACHIEVEMENTS ────────────────────────────────────────────────────────────
function checkAchievements(elapsed, streak) {
  const solved = getSolved();
  const count = solved.length;
  const newOnes = [];

  const tryUnlock = (id) => { if (addAch(id)) newOnes.push(id); };

  if (count === 1)  tryUnlock('first_blood');
  if (count >= 3)   tryUnlock('hat_trick');
  if (count >= 10)  tryUnlock('ten_down');
  if (count >= 20)  tryUnlock('halfway');
  if (count >= PROBLEMS.length)  tryUnlock('legend_all');
  if (streak >= 3)  tryUnlock('on_fire');
  if (streak >= 7)  tryUnlock('week_warrior');
  if (elapsed > 0 && elapsed < 180) tryUnlock('speed_demon');
  if (!hintOpened)  tryUnlock('hint_free');

  // Pattern checks
  const patternProblems = {};
  PROBLEMS.forEach(p => {
    if (!patternProblems[p.pattern]) patternProblems[p.pattern] = [];
    patternProblems[p.pattern].push(p.id);
  });
  const arrayProbs = patternProblems['Arrays & Hashing'] || [];
  const dpProbs    = patternProblems['Dynamic Programming'] || [];
  const graphProbs = patternProblems['Graphs'] || [];

  if (arrayProbs.every(id => solved.includes(id))) tryUnlock('array_master');
  if (dpProbs.every(id   => solved.includes(id)))  tryUnlock('dp_guru');
  if (graphProbs.every(id=> solved.includes(id)))  tryUnlock('graph_explorer');

  // Queue toasts
  newOnes.forEach(id => queueAchievementToast(id));
}

function queueAchievementToast(achId) {
  achievementQueue.push(achId);
  if (!achievementBusy) drainAchievementQueue();
}

function drainAchievementQueue() {
  if (achievementQueue.length === 0) { achievementBusy = false; return; }
  achievementBusy = true;
  const id = achievementQueue.shift();
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (!ach) { drainAchievementQueue(); return; }

  const container = document.getElementById('achievement-container');
  const el = document.createElement('div');
  el.className = 'ach-toast';
  el.innerHTML = `<div class="ach-toast-title">\uD83C\uDFC5 Achievement Unlocked!</div>
    <div class="ach-toast-body">${ach.icon} ${ach.name} &mdash; ${ach.desc}</div>`;
  container.appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => { el.classList.add('visible'); }); });

  setTimeout(() => {
    el.classList.remove('visible');
    setTimeout(() => { el.remove(); drainAchievementQueue(); }, 400);
  }, 4000);
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
function fireConfetti() {
  const container = document.getElementById('confetti-container');
  const colors = ['#3fb950','#58a6ff','#d29922','#d2a8ff','#f85149','#ff7b72'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const x = Math.random() * 100;
    const delay = Math.random() * 0.8;
    const dur   = 2.5 + Math.random() * 1.5;
    const size  = 6 + Math.random() * 8;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.cssText = `
      left:${x}vw; width:${size}px; height:${size}px;
      background:${color}; border-radius:${shape};
      animation-duration:${dur}s; animation-delay:${delay}s;
    `;
    container.appendChild(piece);
    setTimeout(() => piece.remove(), (dur + delay + 0.5) * 1000);
  }
}

// ─── STATS MODAL ─────────────────────────────────────────────────────────────
function openStatsModal() {
  const xp     = getXP();
  const lv     = getLevel(xp);
  const lvXP   = (lv - 1) * 100;
  const solved = getSolved();
  const achs   = getAchs();
  const streak = getStreak();
  const best   = getBestTime();
  const solveDates   = getSolveDates();
  const totalProblems = PROBLEMS.length;

  const now      = new Date();
  const todayKey = now.toISOString().slice(0, 10);
  const dowToday = now.getDay(); // 0=Sun,6=Sat

  // Schedule: Sat(6)=4, Sun(0)=4, weekdays=1
  const dailyTarget = (dowToday === 0 || dowToday === 6) ? 4 : 1;
  const solvedToday = (solveDates[todayKey] || []).length;
  const todayLeft   = Math.max(0, dailyTarget - solvedToday);

  // This week (Mon–Sun)
  const WEEK_TARGETS = [4,1,1,1,1,1,4]; // Sun,Mon,Tue,Wed,Thu,Fri,Sat
  const dayNames     = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  // Find Monday of current week
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((dowToday + 6) % 7));
  let weekSolved = 0, weekTarget = 0;
  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const key = d.toISOString().slice(0, 10);
    const dow = d.getDay();
    const target = WEEK_TARGETS[dow];
    const done   = (solveDates[key] || []).length;
    const isPast = d < now || key === todayKey;
    weekTarget += target;
    if (isPast) weekSolved += done;
    weekDays.push({ name: dayNames[dow], target, done, key, isToday: key === todayKey, isPast });
  }

  // Finish line projection — schedule-based
  // Remaining weeks: simulate week by week
  const remaining = totalProblems - solved.length;
  const perWeek   = 13; // 4+4+1*5
  const weeksNeeded = Math.ceil(remaining / perWeek);
  const finishDate  = new Date(now);
  finishDate.setDate(now.getDate() + weeksNeeded * 7);
  const finishStr   = finishDate.toLocaleDateString('default', { month:'short', day:'numeric', year:'numeric' });

  // Today status
  const todayStatus = solvedToday >= dailyTarget ? '✓ Daily goal hit!' :
    todayLeft === 1 ? '1 more to hit today\'s goal' :
    `${todayLeft} more to hit today's goal`;
  const todayColor  = solvedToday >= dailyTarget ? '#3fb950' : '#d29922';

  // Pattern breakdown
  const patternMap = {};
  PROBLEMS.forEach(p => {
    if (!patternMap[p.pattern]) patternMap[p.pattern] = { total: 0, done: 0 };
    patternMap[p.pattern].total++;
    if (solved.includes(p.id)) patternMap[p.pattern].done++;
  });

  const totalE = PROBLEMS.filter(p => p.difficulty === 'easy').length;
  const totalM = PROBLEMS.filter(p => p.difficulty === 'medium').length;
  const doneE  = PROBLEMS.filter(p => p.difficulty === 'easy'   && solved.includes(p.id)).length;
  const doneM  = PROBLEMS.filter(p => p.difficulty === 'medium' && solved.includes(p.id)).length;

  const bestStr = best > 0
    ? `${String(Math.floor(best/60)).padStart(2,'0')}:${String(best%60).padStart(2,'0')}`
    : '--';

  // ── Today's Quest ──
  const todayPct = Math.min(100, (solvedToday / dailyTarget) * 100);
  let html = `
  <div class="modal-section">
    <h3>Today's Quest</h3>
    <div style="display:flex;align-items:center;gap:18px;margin-bottom:12px">
      <div style="text-align:center">
        <div style="font-size:36px;font-weight:800;color:${todayColor};line-height:1">${solvedToday}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">of ${dailyTarget} today</div>
      </div>
      <div style="flex:1">
        <div class="progress-bar" style="height:10px;border-radius:6px">
          <div class="progress-fill green" style="width:${todayPct}%;background:${todayColor};border-radius:6px"></div>
        </div>
        <div style="font-size:12px;color:${todayColor};margin-top:6px;font-weight:600">${todayStatus}</div>
      </div>
    </div>
  </div>

  <div class="modal-section">
    <h3>This Week's Sprint &nbsp;<span style="font-size:11px;color:var(--muted);font-weight:400">${weekSolved} / ${weekTarget} so far</span></h3>
    <div style="display:flex;gap:6px;margin-top:4px">`;

  weekDays.forEach(d => {
    const pct  = Math.min(100, d.target > 0 ? (d.done / d.target) * 100 : 0);
    const hit  = d.done >= d.target;
    const col  = d.isToday ? '#58a6ff' : hit ? '#3fb950' : d.isPast ? '#d29922' : 'var(--border2)';
    const textCol = d.isToday ? '#58a6ff' : 'var(--muted)';
    html += `<div style="flex:1;text-align:center">
      <div style="font-size:10px;color:${textCol};margin-bottom:4px;font-weight:${d.isToday?700:400}">${d.name}</div>
      <div style="height:48px;background:var(--surface2);border-radius:4px;position:relative;overflow:hidden;border:1px solid ${d.isToday?'#58a6ff':'var(--border)'}">
        <div style="position:absolute;bottom:0;width:100%;height:${pct}%;background:${col};opacity:0.8;transition:height 0.3s"></div>
      </div>
      <div style="font-size:10px;color:${col};margin-top:3px;font-weight:600">${d.isPast||d.isToday ? d.done : ''}${d.isPast||d.isToday ? `/${d.target}` : `/${d.target}`}</div>
    </div>`;
  });

  html += `</div></div>

  <div class="modal-section">
    <h3>Finish Line</h3>
    <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
      <div style="text-align:center">
        <div style="font-size:32px;font-weight:800;color:#58a6ff;line-height:1">${weeksNeeded}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">weeks to go</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:32px;font-weight:800;color:#3fb950;line-height:1">${remaining}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">problems left</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:700;color:var(--accent2);line-height:1">${finishStr}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">est. done date</div>
      </div>
    </div>
    <div style="margin-top:14px">
      <div class="progress-bar" style="height:8px;border-radius:6px">
        <div class="progress-fill green" style="width:${Math.min(100,(solved.length/totalProblems)*100)}%;border-radius:6px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px">
        <span>${solved.length} solved</span><span>${totalProblems} total</span>
      </div>
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--muted)">Based on 13 problems/week (4 Sat + 4 Sun + 1×5 weekdays)</div>
  </div>

  <div class="modal-section">
    <h3>Rank &nbsp;<span style="font-size:11px;color:var(--muted);font-weight:400">${streak} day streak 🔥 &nbsp;⚡ ${bestStr} fastest</span></h3>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px">
      <div style="font-size:28px;font-weight:800;color:#58a6ff">Lv.${lv}</div>
      <div style="flex:1">
        <div style="font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:5px">${getLevelName(lv)}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,xp-lvXP)}%"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${xp-lvXP}/100 XP to next level</div>
      </div>
    </div>
    <div style="display:flex;gap:10px">
      <div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:11px;color:#3fb950;font-weight:700;margin-bottom:3px">EASY</div>
        <div class="progress-bar" style="height:5px"><div class="progress-fill green" style="width:${totalE>0?(doneE/totalE)*100:0}%"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">${doneE}/${totalE}</div>

async function fetchWithTimeout(url, opts, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { ...opts, signal: ctrl.signal });
    clearTimeout(t); return r;
  } catch (e) { clearTimeout(t); throw e; }
}

async function runCode() {
  const btn = document.getElementById('btn-run');
  const out = document.getElementById('output-content');
  const code = editor.getValue();

  btn.disabled = true;
  btn.textContent = '⏳ Running...';
  document.getElementById('btn-mark-solved').style.display = 'none';
  lastRunHadOutput = false;

  // Chrome hard-blocks ALL fetch() from file:// at the OS level — no workaround.
  // Must be served from http://localhost to make API calls.
  if (location.protocol === 'file:') {
    showLocalServerPrompt(out);
    btn.disabled = false;
    btn.textContent = '▶ Run Code';
    return;
  }

  out.innerHTML = '<span class="out-info">Compiling and running...</span>';

  const jsonHeader = { 'Content-Type': 'application/json' };
  let success = false;

  // ── 1. Local .NET server (server.js) — fastest, no internet needed ──────────
  try {
    const res = await fetchWithTimeout('http://localhost:8081/execute',
      { method: 'POST', headers: jsonHeader, body: JSON.stringify({ code }) }, 15000);
    if (!res.ok) throw new Error();
    showLocalResult(await res.json()); success = true;
  } catch (_) {}

  // ── 2. Piston fallback (when on a real web server / internet) ───────────────
  if (!success) {
    out.innerHTML = '<span class="out-info">Trying backup server...</span>';
    try {
      const body = JSON.stringify({
        language: 'csharp', version: '*',
        files: [{ name: 'solution.cs', content: code }],
        stdin: '', args: [], compile_timeout: 10000, run_timeout: 5000,
      });
      const res = await fetchWithTimeout('https://emkc.org/api/v2/piston/execute',
        { method: 'POST', headers: jsonHeader, body }, 10000);
      if (!res.ok) throw new Error();
      showPistonResult(await res.json()); success = true;
    } catch (_) {}
  }

  if (!success) {
    out.innerHTML = `<div class="out-label" style="color:var(--red)">EXECUTION FAILED</div>
      <div class="out-info" style="margin-top:8px">Make sure you launched via <strong>start_ide.bat</strong> (not by opening the file directly).</div>`;
  }

  btn.disabled = false;
  btn.textContent = '▶ Run Code';
}

function parseBuildErrors(stderr) {
  const errors = [];
  const re = /Program\.cs\((\d+),(\d+)\):\s*(error|warning)\s+(CS\d+):\s*(.+)/g;
  let m;
  while ((m = re.exec(stderr)) !== null) {
    errors.push({ line: +m[1], col: +m[2], severity: m[3], code: m[4], message: m[5].trim() });
  }
  return errors;
}

function applyBuildMarkers(errors) {
  const markers = errors.map(e => ({
    severity: e.severity === 'error' ? monaco.MarkerSeverity.Error : monaco.MarkerSeverity.Warning,
    startLineNumber: e.line, startColumn: e.col,
    endLineNumber: e.line, endColumn: e.col + 1,
    message: `${e.code}: ${e.message}`,
  }));
  monaco.editor.setModelMarkers(editor.getModel(), 'build', markers);
  if (errors.length > 0) editor.revealLineInCenter(errors[0].line);
}

function showLocalResult(data) {
  const out = document.getElementById('output-content');
  let html = '';
  if (data.error) {
    html = `<div class="out-label">SERVER ERROR</div><pre class="out-error">${escHtml(data.error)}</pre>`;
    lastRunHadOutput = false;
  } else if (data.exitCode !== 0 && !data.stdout.trim()) {
    const errors = parseBuildErrors(data.stderr || '');
    if (errors.length > 0) {
      applyBuildMarkers(errors);
      html = `<div class="out-label">BUILD ERRORS</div>`;
      errors.forEach(e => {
        const cls = e.severity === 'error' ? 'out-error' : 'out-info';
        html += `<div class="${cls}" style="cursor:pointer;padding:3px 0;margin-bottom:2px"
          onclick="editor.revealLineInCenter(${e.line});editor.setPosition({lineNumber:${e.line},column:${e.col}});editor.focus()">
          <span style="opacity:0.55;font-size:11px;margin-right:6px">Line ${e.line}:</span><strong>${escHtml(e.code)}</strong> ${escHtml(e.message)}
        </div>`;
      });
    } else {
      monaco.editor.setModelMarkers(editor.getModel(), 'build', []);
      html = `<div class="out-label">COMPILE / RUNTIME ERROR</div><pre class="out-error">${escHtml(data.stderr || 'Unknown error')}</pre>`;
    }
    lastRunHadOutput = false;
  } else if (data.stdout.trim()) {
    monaco.editor.setModelMarkers(editor.getModel(), 'build', []);
    html = `<div class="out-label">OUTPUT</div><div class="out-success" style="margin-bottom:8px">✓ Compiled and ran successfully</div>`;
    html += `<pre class="out-stdout">${escHtml(data.stdout)}</pre>`;
    if (data.stderr.trim()) html += `<div class="out-label" style="margin-top:8px">WARNINGS</div><pre class="out-error">${escHtml(data.stderr)}</pre>`;
    lastRunHadOutput = true;
    const solved = getSolved();
    if (!solved.includes(currentProblem.id)) document.getElementById('btn-mark-solved').style.display = 'inline-block';
  } else {
    monaco.editor.setModelMarkers(editor.getModel(), 'build', []);
    html = `<div class="out-info">No output. Make sure Main() calls Console.WriteLine().</div>`;
    if (data.stderr.trim()) html += `<pre class="out-error" style="margin-top:8px">${escHtml(data.stderr)}</pre>`;
    lastRunHadOutput = false;
  }
  out.innerHTML = html;
}

function showPistonResult(data) {
  const out = document.getElementById('output-content');
  let html = '';
  const compile = data.compile || {};
  const run = data.run || {};

  if (compile.stderr && compile.stderr.trim()) {
    html += `<div class="out-label">COMPILE ERROR</div><pre class="out-error">${escHtml(compile.stderr)}</pre>`;
    lastRunHadOutput = false;
  } else if (run.stderr && run.stderr.trim()) {
    html += `<div class="out-label">RUNTIME ERROR</div><pre class="out-error">${escHtml(run.stderr)}</pre>`;
    lastRunHadOutput = false;
  } else if (run.stdout && run.stdout.trim()) {
    html += `<div class="out-label">OUTPUT</div><div class="out-success" style="margin-bottom:8px">✓ Compiled and ran successfully</div>`;
    html += `<pre class="out-stdout">${escHtml(run.stdout)}</pre>`;
    lastRunHadOutput = true;
    const solved = getSolved();
    if (!solved.includes(currentProblem.id)) {
      document.getElementById('btn-mark-solved').style.display = 'inline-block';
    }
  } else if (run.code !== 0) {
    html += `<div class="out-label">ERROR</div><div class="out-error">Process exited with code ${run.code}</div>`;
    if (run.output) html += `<pre class="out-error">${escHtml(run.output)}</pre>`;
    lastRunHadOutput = false;
  } else {
    html += `<div class="out-info">No output. Make sure Main() prints something.</div>`;
    lastRunHadOutput = false;
  }

  out.innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {

      'editor.selectionBackground':  '#8b5cf630',
