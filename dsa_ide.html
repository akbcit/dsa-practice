      'editorIndentGuide.background1': '#1e1e2a',
    }
  });

  editor = monaco.editor.create(document.getElementById('editor-container'), {
    value: currentProblem.starterCode,
    language: 'csharp',
    theme: 'aditya-dark',
    fontSize: 15,
    fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
    fontLigatures: true,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    lineNumbers: 'on',
    roundedSelection: true,
    automaticLayout: true,
    tabSize: 4,
    wordWrap: 'off',
    padding: { top: 16, bottom: 16 },
    lineHeight: 24,
    letterSpacing: 0.3,
    smoothScrolling: true,
    cursorBlinking: 'smooth',
    cursorSmoothCaretAnimation: 'on',
  });

  // ─── FORMAT CODE BUTTON ───────────────────────────────────────────────────
  window.formatCode = function() {
    const code = editor.getValue();
    const lines = code.split('\n');
    let indent = 0;
    const formatted = lines.map(line => {
      const trimmed = line.trim();
      if (!trimmed) return '';
      // decrease indent for closing braces before printing
      if (trimmed.startsWith('}')) indent = Math.max(0, indent - 1);
      const result = '    '.repeat(indent) + trimmed;
      // increase indent after opening braces
      const opens = (trimmed.match(/\{/g) || []).length;
      const closes = (trimmed.match(/\}/g) || []).length;
      indent = Math.max(0, indent + opens - closes);
      return result;
    });
    editor.setValue(formatted.join('\n'));
  };

  // ─── FORMAT CODE CONTEXT MENU ITEM ───────────────────────────────────────
  editor.addAction({
    id: 'format-code',
    label: 'Format Code',
    contextMenuGroupId: '1_modification',
    contextMenuOrder: 1,
    run: function(ed) {
      ed.getAction('editor.action.formatDocument').run();
    }
  });

  // ─── SMART LOOP INSERTION ─────────────────────────────────────────────────
  // Detect arrays, strings, Lists declared anywhere in the current code
  function detectIterables(code) {
    const seen = new Map();
    const order = [];
    function add(name, type) {
      if (!seen.has(name)) { seen.set(name, type); order.push(name); }
    }
    const rx = [
      [/\b(int|string|char|bool|double|long)\[\]\s+(\w+)/g,  (m) => add(m[2], m[1]+'[]')],
      [/\bList<([^>]+)>\s+(\w+)/g,                           (m) => add(m[2], 'List<'+m[1]+'>')],
      [/\bIList<([^>]+)>\s+(\w+)/g,                          (m) => add(m[2], 'IList<'+m[1]+'>')],
      [/\bstring\s+(\w+)\s*(?:=|;)/g,                        (m) => add(m[1], 'string')],
    ];
    for (const [re, fn] of rx) { let m; while ((m = re.exec(code)) !== null) fn(m); }
    return order.map(n => ({ name: n, type: seen.get(n) }));
  }

  function buildLoop(v) {
    const len = v.type.startsWith('List') || v.type.startsWith('IList') ? 'Count' : 'Length';
    const inner = v.type === 'string' ? `\n        char c = ${v.name}[i];` : '';
    return `for (int i = 0; i < ${v.name}.${len}; i++) {${inner}\n        \n    }`;
  }

  // Ctrl+Shift+L → insert loop for selected variable, or last detected iterable
  editor.addCommand(
    monaco.KeyMod.CtrlCmd | monaco.KeyMod.Shift | monaco.KeyCode.KeyL,
    () => {
      const sel  = editor.getSelection();
      const code = editor.getModel().getValue();
      const vars = detectIterables(code);
      const selectedText = editor.getModel().getValueInRange(sel).trim();
      const target = vars.find(v => v.name === selectedText) || vars[vars.length - 1];
      const loopText = target ? buildLoop(target) : 'for (int i = 0; i < arr.Length; i++) {\n    \n}';
      editor.executeEdits('loop', [{ range: sel, text: loopText }]);
      // move cursor inside the loop body
      const lines = loopText.split('\n');
      const insertLine = sel.startLineNumber + lines.length - 2;
      editor.setPosition({ lineNumber: insertLine, column: 9 });
      editor.focus();
    }
  );

  // Right-click → Insert Loop (inserts at end of current method body)
  editor.addAction({
    id: 'insert-for-loop',
    label: 'Insert Loop',
    contextMenuGroupId: '1_modification',
    contextMenuOrder: 1,
    run(ed) {
      const model = ed.getModel();
      const pos   = ed.getPosition();
      const lines = model.getLinesContent();

      // Walk backward from cursor to find the method's opening {
      let methodStart = pos.lineNumber;
      for (let i = pos.lineNumber; i >= 1; i--) {
        const t = lines[i - 1].trim();
        if (/\)\s*\{/.test(t) || (/\{/.test(t) && /\b(void|int|bool|string|public|private|static)\b/.test(t))) {
          methodStart = i; break;
        }
      }

      // Count braces from methodStart to find the matching closing }
      let depth = 0, methodEnd = null, opened = false;
      for (let i = methodStart; i <= lines.length; i++) {
        for (const ch of lines[i - 1]) {
          if (ch === '{') { depth++; opened = true; }
          if (ch === '}') { depth--; }
        }
        if (opened && depth === 0) { methodEnd = i; break; }
      }
      if (!methodEnd) return;

      // Derive indentation: closing brace indent + 4 spaces = body indent
      const closeIndent = lines[methodEnd - 1].match(/^(\s*)/)[1];
      const bodyIndent  = closeIndent + '    ';
      const loop = `${bodyIndent}for (int i = 0; i < x.Length; i++) {\n${bodyIndent}    \n${bodyIndent}}\n`;

      ed.executeEdits('insert-loop', [{
        range: new monaco.Range(methodEnd, 1, methodEnd, 1),
        text: loop,
      }]);
      // Cursor lands on empty line inside the loop body
      ed.setPosition({ lineNumber: methodEnd + 1, column: bodyIndent.length + 5 });
      ed.focus();
    }
  });

  // Right-click → Insert Foreach (inserts foreach (var kvp in x) at end of method)
  editor.addAction({
    id: 'insert-foreach',
    label: 'Insert Foreach',
    contextMenuGroupId: '1_modification',
    contextMenuOrder: 2,
    run(ed) {
      const model = ed.getModel();
      const pos   = ed.getPosition();
      const lines = model.getLinesContent();

      let methodStart = pos.lineNumber;
      for (let i = pos.lineNumber; i >= 1; i--) {
        const t = lines[i - 1].trim();
        if (/\)\s*\{/.test(t) || (/\{/.test(t) && /\b(void|int|bool|string|public|private|static)\b/.test(t))) {
          methodStart = i; break;
        }
      }

      let depth = 0, methodEnd = null, opened = false;
      for (let i = methodStart; i <= lines.length; i++) {
        for (const ch of lines[i - 1]) {
          if (ch === '{') { depth++; opened = true; }
          if (ch === '}') { depth--; }
        }
        if (opened && depth === 0) { methodEnd = i; break; }
      }
      if (!methodEnd) return;

      const closeIndent = lines[methodEnd - 1].match(/^(\s*)/)[1];
      const bodyIndent  = closeIndent + '    ';
      const loop = `${bodyIndent}foreach (var kvp in x) {\n${bodyIndent}    \n${bodyIndent}}\n`;

      ed.executeEdits('insert-foreach', [{
        range: new monaco.Range(methodEnd, 1, methodEnd, 1),
        text: loop,
      }]);
      ed.setPosition({ lineNumber: methodEnd + 1, column: bodyIndent.length + 5 });
      ed.focus();
    }
  });

  // "for" keyword completion — shows one snippet per detected iterable
  monaco.languages.registerCompletionItemProvider('csharp', {
    triggerCharacters: ['r'],
    provideCompletionItems(model, position) {
      const before = model.getLineContent(position.lineNumber).substring(0, position.column - 1).trimStart();
      if (!/^for?$/.test(before)) return { suggestions: [] };
      const code  = model.getValue();
      const vars  = detectIterables(code);
      const word  = model.getWordUntilPosition(position);
      const range = {
        startLineNumber: position.lineNumber, endLineNumber: position.lineNumber,
        startColumn: word.startColumn, endColumn: position.column,
      };
      const suggestions = vars.map(v => ({
        label: `for ${v.name}  — ${v.type}`,
        kind: monaco.languages.CompletionItemKind.Snippet,
        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
        insertText: buildLoop(v).replace('\n        \n    }', '\n        $0\n    }'),
        documentation: `Loop over ${v.name} (${v.type})`,
        sortText: '0' + v.name,
        range,
      }));
      // also offer a generic fallback
      suggestions.push({

      21: `## 21. Merge Two Sorted Lists\n\n### What is the problem asking?\n\nYou have two sorted linked lists. Merge them into one sorted linked list by rewiring the pointers — don't create new nodes.\n\n\`\`\`\nlist1:  1 → 2 → 4\nlist2:  1 → 3 → 4\nresult: 1 → 1 → 2 → 3 → 4 → 4\n\`\`\`\n\n---\n\n### The intuition — two piles of cards\n\nImagine two sorted piles of cards face-up. Each step you:\n1. Look at the top card of each pile\n2. Pick the smaller one\n3. Advance that pile forward\n\n\`\`\`\npile1:  1 → 2 → 4\npile2:  1 → 3 → 4\n\n1 vs 1 → pick left (tie)    result: 1\n2 vs 1 → pick right         result: 1 → 1\n2 vs 3 → pick left          result: 1 → 1 → 2\n4 vs 3 → pick right         result: 1 → 1 → 2 → 3\n4 vs 4 → pick left          result: 1 → 1 → 2 → 3 → 4\npile1 empty → attach rest   result: 1 → 1 → 2 → 3 → 4 → 4\n\`\`\`\n\nYou never need to look beyond the top card. Just compare and pick.\n\n---\n\n### The dummy node — why you need it\n\nWhen you pick the first node, you have nothing to attach it TO yet. A dummy node solves this — create a throwaway node so curr.next = node works from the very first pick.\n\n\`\`\`\ndummy[0] → (nothing yet)\ncurr → dummy           ← curr starts HERE, at dummy\n\`\`\`\n\nAfter picking node [1]:\n\`\`\`\ndummy[0] → [1]\n             ↑ curr moves here\n\`\`\`\n\nAt the end return dummy.next to skip the throwaway [0].\n\n**dummy never moves. curr walks forward every step.**\n\n---\n\n### The three operations every iteration\n\nEach iteration does exactly three things:\n\n\`\`\`csharp\ncurr.next = list1;        // 1. WELD — attach the picked node onto the chain\nlist1 = list1.next;       // 2. ADVANCE PILE — move that list forward one\ncurr = curr.next;         // 3. ADVANCE CURR — move your result finger forward\n\`\`\`\n\nThe mistake to avoid: curr = list1 just moves your finger to that node. It does NOT weld it onto anything. You need curr.next = list1.\n\n---\n\n### Why && not ||\n\n\`\`\`csharp\nwhile (list1 != null && list2 != null)  // CORRECT\nwhile (list1 != null || list2 != null)  // CRASH\n\`\`\`\n\nWith ||: if list1 runs out you still enter the loop and hit list1.val → NullReferenceException.\n\nWith &&: exit as soon as either list runs out. Then attach the remaining list — it is already sorted:\n\n\`\`\`csharp\ncurr.next = list1 ?? list2;\n\`\`\`\n\n---\n\n### Full solution\n\n\`\`\`csharp\npublic ListNode MergeTwoLists(ListNode list1, ListNode list2) {\n    ListNode dummy = new ListNode(0);\n    ListNode curr = dummy;\n\n    while (list1 != null && list2 != null) {\n        if (list1.val <= list2.val) {\n            curr.next = list1;\n            list1 = list1.next;\n        } else {\n            curr.next = list2;\n            list2 = list2.next;\n        }\n        curr = curr.next;\n    }\n\n    curr.next = list1 ?? list2;\n    return dummy.next;\n}\n\`\`\`\n\n---\n\n### Complexity\n\n| | |\n|---|---|\n| Time | O(n + m) — visit each node once |\n| Space | O(1) — no new nodes, just pointer rewiring |`,
      141: `## 141. Linked List Cycle\n\n### What is the problem asking?\n\nGiven the head of a linked list, return true if there is a cycle — i.e. some node's .next points back to an earlier node, creating an infinite loop.\n\n---\n\n### Approach 1 — HashSet (your first instinct)\n\nSave every node you visit. If you see a node you've already saved, there's a cycle.\n\n\`\`\`csharp\nvar seen = new HashSet<ListNode>();\nvar cur = head;\nwhile (cur != null) {\n    if (seen.Contains(cur)) return true;\n    seen.Add(cur);\n    cur = cur.next;\n}\nreturn false;\n\`\`\`\n\n**Time:** O(n) — **Space:** O(n) — works, but uses extra memory.\n\n---\n\n### Approach 2 — Fast and slow pointers (Floyd's algorithm)\n\nNo extra memory. Two pointers start at head. Slow moves 1 step. Fast moves 2 steps.\n\n**No cycle:** fast runs off the end → return false\n\n**Cycle:** fast laps slow and they land on the same node → return true\n\n**Why do they always meet?**\n\nOnce fast enters the cycle, measure the gap between fast and slow in nodes (going forward around the cycle).\n\nEach step: slow moves 1, fast moves 2 → gap shrinks by exactly 1.\n\n\`\`\`\ngap = 4 → 3 → 2 → 1 → 0  ← they meet\n\`\`\`\n\nThe gap starts at some number and decrements by 1 every step. It must hit 0 — it can never skip over 0 because it only ever decrements by 1. When the gap is 0, slow == fast.\n\n\`\`\`\nList: 3 → 2 → 0 → -4\n               ↑         |\n               └─────────┘\n\nStart:   slow=3  fast=3\nStep 1:  slow=2  fast=0\nStep 2:  slow=0  fast=2    (fast lapped around)\nStep 3:  slow=-4 fast=-4   ← MEET → cycle detected\n\`\`\`\n\n**No cycle:**\n\`\`\`\n1 → 2 → null\n\nStep 1:  slow=2  fast=null → loop exits → return false\n\`\`\`\n\n---\n\n### Why check slow == fast AFTER moving?\n\nBoth start at head. If you check before moving, slow==fast immediately (both at head) and you'd return true wrongly. Move first, then check.\n\n---\n\n### Why the loop condition is fast != null && fast.next != null?\n\n- \`fast != null\` — fast itself might be null (even-length list)\n- \`fast.next != null\` — you're about to do fast.next.next, so fast.next must exist first\n\nIf either is null, there's no cycle — a cycle has no null.\n\n---\n\n### Full solution\n\n\`\`\`csharp\npublic bool HasCycle(ListNode head) {\n    ListNode slow = head;\n    ListNode fast = head;\n\n    while (fast != null && fast.next != null) {\n        slow = slow.next;\n        fast = fast.next.next;\n\n        if (slow == fast) return true;\n    }\n\n    return false;\n}\n\`\`\`\n\n---\n\n### Complexity\n\n| | HashSet | Fast/Slow |\n|---|---|---|\n| Time | O(n) | O(n) |\n| Space | O(n) | O(1) |`,
      206: `## 206. Reverse Linked List\n\n### What the problem is asking\n\nTurn this:\n\`\`\`\n1 → 2 → 3 → 4 → 5 → null\n\`\`\`\nInto this:\n\`\`\`\n5 → 4 → 3 → 2 → 1 → null\n\`\`\`\n\n---\n\n### The problem: flipping an arrow loses the chain\n\nIf you flip node(1).next = null, node(2) is now unreachable. You must save next before flipping.\n\nYou need THREE variables:\n- prev — where the flipped arrow points\n- cur — the node you're flipping\n- next — saved reference to what's ahead\n\n---\n\n### Walk through\n\n\`\`\`\nprev=null, cur=node(1)\n\nnext = cur.next      → save node(2)\ncur.next = prev      → flip: node(1).next = null\nprev = cur           → prev = node(1)\ncur = next           → cur = node(2)\n\nnext = cur.next      → save node(3)\ncur.next = prev      → node(2).next = node(1)\nprev = cur           → prev = node(2)\ncur = next           → cur = node(3)\n\n... repeat until cur = null\nprev is the new head\n\`\`\`\n\n---\n\n### Full solution\n\n\`\`\`csharp\npublic ListNode ReverseList(ListNode head) {\n    ListNode prev = null;\n    ListNode cur = head;\n\n    while (cur != null) {\n        ListNode next = cur.next;\n        cur.next = prev;\n        prev = cur;\n        cur = next;\n    }\n\n    return prev;\n}\n\`\`\`\n\n---\n\n### Complexity\n\n| | |\n|---|---|\n| Time | O(n) |\n| Space | O(1) |`,
      128: `## 128. Longest Consecutive Sequence

### What is the problem asking?

Given an unsorted array, find the length of the longest sequence of consecutive integers.

\`\`\`
[100, 4, 200, 1, 3, 2]  →  4   (sequence: 1,2,3,4)
[0,3,7,2,5,8,4,6,0,1]  →  9   (sequence: 0,1,2,3,4,5,6,7,8)
\`\`\`

No sorting allowed — must be O(n).

---

### Step 1 — Obvious approach: sort first

Sort the array, then scan for consecutive runs.

\`\`\`
[1, 2, 3, 4, 100, 200]  →  longest run = 4
\`\`\`

Works, but O(n log n). The problem wants O(n).

The issue: you sort just to answer "is the next number here?" A HashSet answers that in O(1).

---

### Step 2 — Put everything in a HashSet

\`\`\`csharp
var set = new HashSet<int>(nums);
\`\`\`

Now \`set.Contains(x)\` is O(1). We can check any number instantly without sorting.

---

### Step 3 — Naive: count from every element (still O(n²))

For every number, count backwards to find sequence length:

\`\`\`
At 4: check 3✓ 2✓ 1✓ 0✗  →  length 4
At 3: check 2✓ 1✓ 0✗      →  length 3
At 2: check 1✓ 0✗          →  length 2
At 1: check 0✗             →  length 1
\`\`\`

You retrace the sequence [1,2,3,4] four times. That redundancy makes it O(n²).

---

### Step 4 — The O(n) insight: only start from sequence starts

A number is the START of a sequence only if \`num - 1\` is NOT in the set.

\`\`\`
set = {1, 2, 3, 4, 100, 200}

1:   is 0 in set?   NO  → start → count forward: 1,2,3,4 → length 4
2:   is 1 in set?   YES → skip
3:   is 2 in set?   YES → skip
4:   is 3 in set?   YES → skip
100: is 99 in set?  NO  → start → count forward: just 100 → length 1
200: is 199 in set? NO  → start → count forward: just 200 → length 1
\`\`\`

Only starts do the forward counting. Non-starts are skipped entirely.

---

### Why is it O(n) despite the while loop inside the for loop?

This is the key question — it looks like O(n²) but it is not.

Think about how many times each number gets touched:
- Once in the outer loop (either skipped immediately, or identified as a start)
- At most once inside a while loop (counted as part of exactly one sequence)

Total touches = at most 2n across the entire run = O(n).

\`\`\`
[1, 2, 3, 4, 100, 200]

outer loop: touches 1,2,3,4,100,200         = 6 touches
while loop: from start=1, touches 2,3,4     = 3 touches
            100 and 200 → while runs 0 times = 0 touches
total = 9 = O(n)
\`\`\`

Compare the O(n²) version without the start check:
\`\`\`
At 4: while touches 3,2,1  = 3
At 3: while touches 2,1    = 2
At 2: while touches 1      = 1
At 1: while touches 0      = 0
total while touches = 6 for just 4 elements → grows as n²
\`\`\`

The single line \`if (set.Contains(num - 1)) continue\` collapses it from O(n²) to O(n).

---

### Full solution

\`\`\`csharp
public int LongestConsecutive(int[] nums) {
    if (nums.Length == 0) return 0;

    var set = new HashSet<int>(nums);
    int maxLen = 1;

    foreach (int num in set) {               // iterate set to skip duplicates
        if (set.Contains(num - 1)) continue; // not a start, skip

        int len = 1;
        while (set.Contains(num + len))
            len++;

        maxLen = Math.Max(maxLen, len);
    }

    return maxLen;
}
\`\`\`

---

### Complexity

- **Time:** O(n) — each element touched at most twice
- **Space:** O(n) — HashSet`,
      238: `## 238. Product of Array Except Self

### What is the problem actually asking?

Given [1, 2, 3, 4], return an array where each position holds the product of every number EXCEPT the one at that position.

\`\`\`
nums:   [1,  2,  3,  4]
result: [24, 12, 8,  6]

result[0] = 2×3×4 = 24
result[1] = 1×3×4 = 12
result[2] = 1×2×4 = 8
result[3] = 1×2×3 = 6
\`\`\`

---

### Why not just divide?

Your first instinct: totalProduct / nums[i].

Breaks on zero. If nums[i] = 0, you get 0 ÷ 0 = undefined.
You'd need ugly special cases. The two-pass approach just works with no edge cases.

---

### The core insight

For any index i, the answer is:

**everything to the LEFT of i** × **everything to the RIGHT of i**

We compute each half separately in two passes.

---

### Left pass — walk left to right

At each index, store the running product of everything BEFORE it.

\`\`\`
nums:  [1,  2,  3,  4]

At i=0: nothing to the left → 1 (empty product)
At i=1: just nums[0] = 1
At i=2: nums[0]×nums[1] = 1×2 = 2
At i=3: nums[0]×nums[1]×nums[2] = 1×2×3 = 6

left:  [1,  1,  2,  6]
\`\`\`

Pattern: each cell = previous cell × previous nums element.

\`\`\`csharp
int[] result = new int[nums.Length];
result[0] = 1;
for (int i = 1; i < nums.Length; i++)
    result[i] = result[i-1] * nums[i-1];
// result = [1, 1, 2, 6]
\`\`\`

---

### Right pass — walk right to left

Now multiply in the running product of everything to the RIGHT.
No second array needed — just a single variable \`right\` that starts at 1.

\`\`\`
result so far: [1,  1,  2,  6]   (left products)
right = 1

i=3: result[3] = 6 × 1 = 6,    right = 1×4 = 4
i=2: result[2] = 2 × 4 = 8,    right = 4×3 = 12
i=1: result[1] = 1 × 12 = 12,  right = 12×2 = 24
i=0: result[0] = 1 × 24 = 24
\`\`\`

Final result: [24, 12, 8, 6] ✓

\`\`\`csharp
int right = 1;
for (int i = nums.Length - 1; i >= 0; i--) {
    result[i] *= right;
    right *= nums[i];
}
\`\`\`

---

### Full solution

\`\`\`csharp
public int[] ProductExceptSelf(int[] nums) {
    int[] result = new int[nums.Length];

    // Left pass
    result[0] = 1;
    for (int i = 1; i < nums.Length; i++)
        result[i] = result[i-1] * nums[i-1];

    // Right pass
    int right = 1;
    for (int i = nums.Length - 1; i >= 0; i--) {
        result[i] *= right;
        right *= nums[i];
    }

    return result;
}
\`\`\`

---

### Complexity

- **Time:** O(n) — two passes
- **Space:** O(1) extra (output array excluded)`,
      125: `## 125. Valid Palindrome

### What is the problem asking?

A palindrome reads the same forwards and backwards.
But here you must ignore non-alphanumeric characters and case.

\`\`\`
"A man, a plan, a canal: Panama"
→ strip non-alphanumeric, lowercase: "amanaplanacanalpanama"
→ palindrome? YES
\`\`\`

---

### Step 1 — Basic palindrome (no special chars)

Two pointers: \`i\` at the start, \`j\` at the end. Move inward, compare.

\`\`\`
"racecar"
i=0 j=6: r == r ✓
i=1 j=5: a == a ✓
i=2 j=4: c == c ✓
i=3 j=3: pointers met → done → true
\`\`\`

\`\`\`csharp
while (i < j) {
    if (char.ToLower(s[i]) != char.ToLower(s[j])) return false;
    i++; j--;
}
return true;
\`\`\`

This works for clean strings. Fails on "A man, a plan..." because commas and spaces break the comparison.

---

### Step 2 — Skipping non-alphanumeric chars

When you hit a non-alphanumeric character, skip it — move that pointer inward until you land on a letter or digit.

First instinct: use \`if\` to skip one char at a time.

The problem: \`if\` only skips ONE character. What about \`"a,,,b"\`?
You'd skip the first comma, then compare \`','\` vs \`'b'\` — still wrong.

You need \`while\` — keep skipping until you land on alphanumeric.

\`\`\`csharp
while (i < j && !char.IsLetterOrDigit(s[i])) i++;
while (i < j && !char.IsLetterOrDigit(s[j])) j--;
\`\`\`

---

### Step 3 — The guard condition matters: i < j not i < len

First instinct: guard with \`i < len\` and \`j >= 0\`.

The problem: if the string is all non-alphanumeric (e.g. \`" "\`), skipping runs \`i\` past \`j\`. Then you access \`s[i]\` or \`s[j]\` with crossed/invalid indices → crash or wrong answer.

Using \`i < j\` as the guard in the inner whiles prevents this:
- Once pointers meet or cross, skipping stops
- The outer \`while (i < j)\` won't enter the compare either

\`\`\`csharp
while (i < j && !char.IsLetterOrDigit(s[i])) i++;  // not i < len
while (i < j && !char.IsLetterOrDigit(s[j])) j--;  // not j >= 0
\`\`\`

---

### Step 4 — Also: check bounds BEFORE array access

\`while (!char.IsLetterOrDigit(s[i]) && i < len)\` — WRONG order.

C# evaluates left to right. If \`i == len\`, it accesses \`s[len]\` before checking the bound → IndexOutOfRangeException.

Always put the bounds check first:

\`\`\`csharp
while (i < j && !char.IsLetterOrDigit(s[i])) // bound check first
\`\`\`

---

### Full solution

\`\`\`csharp
public bool IsPalindrome(string s) {
    int i = 0, j = s.Length - 1;

    while (i < j) {
        while (i < j && !char.IsLetterOrDigit(s[i])) i++;
        while (i < j && !char.IsLetterOrDigit(s[j])) j--;

        if (char.ToLower(s[i]) != char.ToLower(s[j])) return false;
        i++; j--;
    }

    return true;
}
\`\`\`

---

### Complexity

- **Time:** O(n) — each character visited at most once
- **Space:** O(1) — no extra data structures`,
      347: `## 347. Top K Frequent Elements

### Start here: what is the problem actually asking?

Given [1,1,1,2,2,3] and k=2, return the 2 elements that appear the most.
Answer: [1, 2]  because 1 appears 3 times, 2 appears 2 times, 3 appears 1 time.

The core task is: count how many times each number appears, then pick the top k counts.

---

### Step 1 — The dumb way (so you see why counting matters)

Brute force: for each unique number, scan the whole array to count it.

\`\`\`
For num = 1: scan [1,1,1,2,2,3] → count = 3
For num = 2: scan [1,1,1,2,2,3] → count = 2
For num = 3: scan [1,1,1,2,2,3] → count = 1
\`\`\`

You're scanning the array once per unique number → O(n²). Slow.

The problem is you're re-scanning repeatedly. What if you counted everything in ONE pass?

---

### Step 2 — Count everything in one pass (this is why a frequency map)

Walk the array once. Every time you see a number, add 1 to its tally.
A Dictionary is just the natural data structure for "number → its count".

\`\`\`
[1, 1, 1, 2, 2, 3]
 ↓
Dictionary:
  see 1 → { 1:1 }
  see 1 → { 1:2 }
  see 1 → { 1:3 }
  see 2 → { 1:3, 2:1 }
  see 2 → { 1:3, 2:2 }
  see 3 → { 1:3, 2:2, 3:1 }
\`\`\`

One pass, O(n). That's the whole reason the freq map exists — it replaces O(n²) repeated scanning with a single O(n) tally.

\`\`\`csharp
var freq = new Dictionary<int, int>();
foreach (var n in nums)
    freq[n] = freq.GetValueOrDefault(n) + 1;
// freq = { 1→3, 2→2, 3→1 }
\`\`\`

Now we have counts. The question is: how do we find the top k from this dictionary?

---

### Step 3 — Natural next thought: just sort it

Sort the dictionary entries by count, take the last k.

\`\`\`csharp
return freq.OrderByDescending(kv => kv.Value)
           .Take(k)
           .Select(kv => kv.Key)
           .ToArray();
\`\`\`

This works. O(n log n) total. Fine for an interview if you say it first and explain the trade-off.

---

### Step 4 — Can we do better? Bucket sort (the O(n) trick)

Sorting is O(n log n) because we don't know what values will appear.
But here we DO know something: a count can only be between 1 and n.
If the array has 6 elements, no number can appear more than 6 times.

So instead of sorting, make an array of size n+1 where the INDEX is the count.

\`\`\`
bucket[1] = numbers that appear 1 time
bucket[2] = numbers that appear 2 times
bucket[3] = numbers that appear 3 times
...
\`\`\`

How to fill it — you are just flipping the freq map.

The freq map says: "number 1 appeared 3 times."
Flip that: "at index 3 (the count), store the number 1."

Go through every entry in the freq map and do this one flip per entry:

\`\`\`
freq map says 1 → 3   so put 1 into bucket[3]
freq map says 2 → 2   so put 2 into bucket[2]
freq map says 3 → 1   so put 3 into bucket[1]

result:
  bucket[1] = [3]
  bucket[2] = [2]
  bucket[3] = [1]
  bucket[4] = empty
  bucket[5] = empty
  bucket[6] = empty
\`\`\`

Why a List at each index and not just one number?
Because two numbers could have the same count. e.g. [1,1,2,2,3] → both 1 and 2 appear twice, so bucket[2] = [1, 2].

Now scan from the right (highest count) and collect k elements:

\`\`\`
i=6: empty
i=5: empty
i=4: empty
i=3: grab 1  → result = [1]
i=2: grab 2  → result = [1, 2]  → we have k=2, done
\`\`\`

No sorting. No comparisons. Just array index lookups → O(n).

\`\`\`csharp
public int[] TopKFrequent(int[] nums, int k) {
    // Step 1: count
    var freq = new Dictionary<int, int>();
    foreach (var n in nums)
        freq[n] = freq.GetValueOrDefault(n) + 1;

    // Step 2: bucket by frequency (index = count)
    var buckets = new List<int>[nums.Length + 1];
    foreach (var (num, count) in freq) {
        buckets[count] ??= new List<int>();
        buckets[count].Add(num);
    }

    // Step 3: collect top k scanning from highest count down
    var result = new List<int>();
    for (int i = buckets.Length - 1; i >= 1 && result.Count < k; i--)
        if (buckets[i] != null)
            result.AddRange(buckets[i]);

    return result.ToArray();
}
\`\`\`

---

### Why each step exists

| Step | What it solves | Without it |
|---|---|---|
| Freq map | Avoids counting each number by re-scanning | O(n²) |
| Sort | Finds top k from the counts | Need to scan unsorted dict |
| Bucket sort | Replaces sort using bounded count range | Stuck at O(n log n) |

The freq map is not the clever part — it just replaces brute force scanning.
The clever part is realising counts are bounded by n, making bucket sort legal.`,
      3: `## 3. Longest Substring Without Repeating Characters

### What is the problem actually asking?

Find the longest stretch of characters in a string where no character repeats. Spaces and special characters count as valid characters too.

\`\`\`
"abcabcbb" → 3  (window "abc")
"pwwkew"   → 3  (window "wke")
"bbbbb"    → 1  (window "b")
" "        → 1  (space is a valid unique character)
\`\`\`

---

### First instinct: reset when you hit a repeat

When you find a character already seen, reset and start fresh from the current character.

\`\`\`
"abcabcbb"
hit 'a' at index 3 → reset, start from index 3 → "a"
\`\`\`

The problem: you miss longer windows. The best window starting after index 0 is "bca" (starting at index 1), not "a" (starting at index 3). Resetting throws away valid progress.

---

### Better: sliding window

Think of a **frame** sliding over the string. The frame can grow or shrink but never goes backward.

**Rule:** the frame must always contain unique characters only.

\`\`\`
s = "a b c a b c b b"
     0 1 2 3 4 5 6 7
\`\`\`

Start with an empty frame at position 0. l = left edge, r = right edge.

\`\`\`
[a]b c a b c b b     add 'a' → unique → grow    max=1
[a b]c a b c b b     add 'b' → unique → grow    max=2
[a b c]a b c b b     add 'c' → unique → grow    max=3
[a b c]a             try 'a' → REPEAT → can't grow
\`\`\`

---

### When you hit a repeat: shrink from the left

Move the LEFT boundary right (remove s[l] from set, l++) until the duplicate is gone. Don't move r — don't reset.

\`\`\`
frame = [a b c]   l=0, r=3
s[r] = 'a' → already in set

remove s[0]='a', l=1
frame = [b c]   → 'a' no longer in set → safe

add 'a' → frame = [b c a]   max=3
\`\`\`

Another example where you shrink more than once:

\`\`\`
frame = [a b c d]   l=0, r=4
s[r] = 'b' → REPEAT

remove s[0]='a', l=1  → set={b,c,d} → 'b' still there
remove s[1]='b', l=2  → set={c,d}   → 'b' gone

add 'b' → frame = [c d b]   max=4
\`\`\`

The shrink is a while loop — keep going until the duplicate is gone:

\`\`\`csharp
while (set.Contains(s[r])) {
    set.Remove(s[l]);
    l++;
}
\`\`\`

---

### Full solution

\`\`\`csharp
public int LengthOfLongestSubstring(string s) {
    var set = new HashSet<char>();
    int l = 0, maxLen = 0;

    for (int r = 0; r < s.Length; r++) {
        while (set.Contains(s[r])) {
            set.Remove(s[l]);
            l++;
        }
        set.Add(s[r]);
        maxLen = Math.Max(maxLen, r - l + 1);
    }

    return maxLen;
}
\`\`\`

---

### Complexity

- **Time:** O(n) — each character is added and removed from the set at most once
- **Space:** O(min(n, m)) — set size bounded by unique characters in the alphabet`,
      11: `## 11. Container With Most Water

### What is the problem actually asking?

You have a bunch of vertical walls standing on a number line. Pick any two walls — the water you can hold between them is limited by the shorter wall (water spills over the shorter one).

\`\`\`
height = [1, 8, 6, 2, 5, 4, 8, 3, 7]
index:    0  1  2  3  4  5  6  7  8

8 |  X           X
7 |  X           X        X
6 |  X  X        X        X
5 |  X  X     X  X        X
4 |  X  X     X  X  X     X
3 |  X  X     X  X  X  X  X
2 |  X  X  X  X  X  X  X  X
1 |X  X  X  X  X  X  X  X  X
  +---------------------------
   0  1  2  3  4  5  6  7  8
\`\`\`

You want to find the pair of walls that holds the **most water**.

The formula for any pair (l, r):

\`\`\`
water = (r - l) × min(height[l], height[r])
\`\`\`

You want to **maximize** that product across all pairs.

---

### Brute force: check every pair

Two nested loops, try all combinations.

\`\`\`
pick wall 0 and wall 1: (1-0) × min(1,8) = 1
pick wall 0 and wall 2: (2-0) × min(1,6) = 2
...
pick wall 1 and wall 8: (8-1) × min(8,7) = 49
...
\`\`\`

O(n²) — too slow.

---

### Two pointer intuition: why we don't need to check every pair

Start with pointers at both ends — this gives the maximum possible width:

\`\`\`
[1, 8, 6, 2, 5, 4, 8, 3, 7]
 L                          R
\`\`\`

Now ask: **which pointer should we move inward?**

**If we move the taller wall inward:**
- Width shrinks
- Height is STILL limited by the shorter wall (it didn't change)
- We can only lose or stay the same — pointless

**If we move the shorter wall inward:**
- Width shrinks
- BUT we might find a taller wall — the height could increase
- Only hope of beating our current best

**Rule: always move the shorter wall inward. If equal, move either (convention: move left).**

---

### Walk through the example

\`\`\`
height = [1, 8, 6, 2, 5, 4, 8, 3, 7]

L=0 (h=1), R=8 (h=7) → water = 8 × min(1,7) = 8    → move L (shorter)
L=1 (h=8), R=8 (h=7) → water = 7 × min(8,7) = 49   → move R (shorter)
L=1 (h=8), R=7 (h=3) → water = 6 × min(8,3) = 18   → move R
L=1 (h=8), R=6 (h=8) → water = 5 × min(8,8) = 40   → move L (equal)
... until L meets R

Max seen = 49 ✓
\`\`\`

---

### Building the code step by step

**Setup:** two pointers at ends, track max.

\`\`\`csharp
int l = 0;
int r = height.Length - 1;  // NOT .Length — that's out of bounds
int maxVol = int.MinValue;
\`\`\`

**Loop:** calculate water each step, then move the shorter pointer.

\`\`\`csharp
while (l < r) {
    maxVol = Math.Max(Math.Min(height[l], height[r]) * (r - l), maxVol);
    // (r - l) not (l - r) — l is always less than r so (l-r) is negative

    if (height[l] >= height[r])
        r--;        // move shorter (or equal) inward
    else
        l++;
}
\`\`\`

---

### Full solution

\`\`\`csharp
public int MaxArea(int[] height) {
    int l = 0;
    int r = height.Length - 1;
    int maxVol = int.MinValue;

    while (l < r) {
        maxVol = Math.Max(Math.Min(height[l], height[r]) * (r - l), maxVol);

        if (height[l] >= height[r])
            r--;
        else
            l++;
    }

    return maxVol;
}
\`\`\`

---

### Complexity

- **Time:** O(n) — each pointer moves inward at most n times total
- **Space:** O(1) — just two pointers and a max variable`,

  function lintCode(code) {
    const markers = [];
    const lines = code.split('\n');
    const clean = stripNonCode(code);

    // 1. Bracket balance
    const stack = [];
    const pairs = { ')':'(', ']':'[', '}':'{' };
    for (let li = 0; li < lines.length; li++) {
      const cl = stripNonCode(lines[li]);
      for (let ci = 0; ci < cl.length; ci++) {
        const ch = cl[ci];
        if ('({['.includes(ch)) { stack.push({ ch, li: li+1, ci: ci+1 }); }
        else if (')}]'.includes(ch)) {
          if (!stack.length || stack[stack.length-1].ch !== pairs[ch]) {
            markers.push({ severity: monaco.MarkerSeverity.Error,
              message: `Unexpected '${ch}' — no matching '${pairs[ch]}'`,
              startLineNumber:li+1,startColumn:ci+1,endLineNumber:li+1,endColumn:ci+2 });
          } else stack.pop();
        }
      }
    }
    for (const u of stack) markers.push({ severity: monaco.MarkerSeverity.Error,
      message: `Unmatched '${u.ch}' — missing closing bracket`,
      startLineNumber:u.li,startColumn:u.ci,endLineNumber:u.li,endColumn:u.ci+1 });

    // 2. Undeclared identifiers
    const declared = collectDeclared(clean);
    const skipLine = /^\s*(?:\/\/|using\s|\[|#)/;
    const usedPat = /(?<![.\w])([A-Z][a-zA-Z_]\w*|[a-z_]\w{1,})\b(?!\s*[<:(])/g;
    for (let li = 0; li < lines.length; li++) {
      const raw = lines[li];
      if (skipLine.test(raw)) continue;
      const cl = stripNonCode(raw);
      usedPat.lastIndex = 0;
      let m;
      while ((m = usedPat.exec(cl)) !== null) {
        const name = m[1];
        if (declared.has(name)) continue;
        const before = cl.slice(0, m.index);
        if (/\.\s*$/.test(before)) continue; // member access
        const after = cl.slice(m.index + name.length);
        if (/^\s*[<(]/.test(after)) continue; // method/generic call
        if (/^\s*:/.test(after)) continue;    // label or ternary
        markers.push({ severity: monaco.MarkerSeverity.Error,
          message: `'${name}' is not declared in this scope`,
          startLineNumber:li+1, startColumn:m.index+1,
          endLineNumber:li+1,   endColumn:m.index+name.length+1 });
      }
    }
    return markers;
  }

  // Type names + snippets shown while typing (no dot)

    ...globalCompletions,
  ];

  monaco.languages.registerCompletionItemProvider('csharp', {
    triggerCharacters: ['.'],
    provideCompletionItems(model, position) {
      const lineText  = model.getLineContent(position.lineNumber);
      const textBefore = lineText.substring(0, position.column - 1);
      const isDot = textBefore.endsWith('.');

      // Find the current word being typed so we replace it properly
      const word = model.getWordUntilPosition(position);
      const range = {
        startLineNumber: position.lineNumber,
        endLineNumber:   position.lineNumber,
        startColumn:     isDot ? position.column : word.startColumn,
        endColumn:       isDot ? position.column : word.endColumn,
      };

      if (isDot) {
        return { suggestions: dotMembers.map(s => ({ ...s, range })) };
      }
      return { suggestions: typeCompletions.map(s => ({ ...s, range })) };
    }
  });
});

// ─── RESIZE HANDLE ───────────────────────────────────────────────────────────
const handle = document.getElementById('resize-handle');
const problemPanel = document.getElementById('problem-panel');
let isResizing = false;

handle.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; });
document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const main = document.getElementById('main');
  const rect = main.getBoundingClientRect();
  const newWidth = Math.max(250, Math.min(e.clientX - rect.left, rect.width - 400));
  problemPanel.style.width = newWidth + 'px';
});
document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = ''; });
</script>
