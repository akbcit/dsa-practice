An array stores values in a **contiguous block of memory** — every element sits right next to the previous one.

### What is a linked list?

A linked list stores values in **nodes** that can be anywhere in memory. Each node has two slots: a **value**, and a **pointer** to the next node.

\`\`\`
Index:  0    1    2    3    4
Value: [10] [20] [30] [40] [50]
\`\`\`

Adding an element in the middle means shifting everything after it. Removing from the middle means shifting everything back. That costs O(n) time.

### What is a linked list?

A linked list stores values in **nodes** that can be anywhere in memory. Each node holds:
1. A value
2. A pointer — the memory address of the NEXT node

\`\`\`
[10 | →] ──→ [20 | →] ──→ [30 | →] ──→ [40 | null]
\`\`\`

The null at the end means "there is no next node — this is the tail."

You don't need a contiguous block. The nodes can be scattered anywhere in memory. The pointer is what connects them.

### In C#, a node looks like this:

\`\`\`csharp
public class ListNode {
    public int val;         // the value stored here
    public ListNode next;   // the address of the next node (null if last)
}
\`\`\`

\`head\` is just a variable that holds the address of the FIRST node.

When people say "the linked list", they mean: given this first node, you can reach every other node by following \`.next\` repeatedly.

### Wait — what actually IS head?

\`head\` is a regular variable. Nothing special about the name — it's just convention.

When you write:

\`\`\`csharp
int x = 5;
\`\`\`

\`x\` holds a number. When you write:

\`\`\`csharp
ListNode head = new ListNode(10);
\`\`\`

\`head\` holds the **memory address** of a node. That's it. It's a variable that says "the list starts here."

You could call it anything — \`myList\`, \`start\`, \`first\`. The name \`head\` is just convention.

The reason it matters: **\`head\` is your only way to find the list.** If you overwrite it, the nodes are still in memory but you can't reach them — they're gone. That's why you always make a copy to walk with:

\`\`\`csharp
var cur = head;        // copy — walk with this
while (cur != null) {
    cur = cur.next;    // move cur, NOT head
}
// head still points to node(10) — list is safe
\`\`\`

You walk with \`cur\`, never touch \`head\`. Same reason you'd hold a thread at the entrance of a maze — you move through it, you don't move the entrance.

---

### What you can do vs. what you can't

**Arrays** — fast at random access (give me index 3 = instant), slow to insert/delete in the middle.

**Linked lists** — slow at random access (you must walk from head), fast to insert/delete (just update a pointer).

\`\`\`
Insert between node A and node B:
  Before: A.next → B
  After:  A.next → newNode, newNode.next → B
  Cost: O(1) — just two pointer updates
\`\`\`

---

### Walking a linked list

You CANNOT use \`list[i]\` — there's no index. You follow the chain manually.

\`\`\`csharp
var cur = head;          // start at the first node
while (cur != null) {    // stop when there's no next
    Console.Write(cur.val);
    cur = cur.next;      // move to the next node
}
\`\`\`

This is the fundamental operation on a linked list. Nearly everything you do with one starts here.

---

### The most important thing to understand about pointers

When you do \`cur = cur.next\`, you are NOT moving a node.
You are moving **your finger** to point at the next node.

The nodes don't move. Their addresses don't change. You just changed which one you're looking at.

\`\`\`
Before: cur → node(10)
cur = cur.next
After:  cur → node(20)

node(10) still exists. node(20) still exists. You just moved the finger.
\`\`\`

This becomes critical whenever you need to rewire pointers (reversing, merging, etc.).

---

### The two-pointer trick on linked lists

Many linked list problems use two pointers moving at different speeds.

**Fast + slow (Floyd's algorithm):**

\`\`\`csharp
var slow = head;
var fast = head;
while (fast != null && fast.next != null) {
    slow = slow.next;        // moves 1 step
    fast = fast.next.next;   // moves 2 steps
}
// when fast reaches the end, slow is at the middle
\`\`\`

---

### Common mistakes

**1. Losing the rest of the list when rewiring:**

\`\`\`csharp
// WRONG — you've lost node(2) forever
node1.next = node3;

// RIGHT — save it first
var saved = node1.next;   // = node(2)
node1.next = node3;
\`\`\`

**2. Not checking for null before accessing .next:**

\`\`\`csharp
// CRASH if cur is null
cur.next.val

// Safe
if (cur != null && cur.next != null) { ... }
\`\`\`

**3. Off-by-one when stopping:**

\`\`\`csharp
// Stops one node BEFORE the last — use when you need cur.next to exist
while (cur.next != null) { ... }

// Stops AT null — use when you just need to visit every node
while (cur != null) { ... }
\`\`\`

---

### Summary

| Operation | Array | Linked List |
|---|---|---|
| Access by index | O(1) | O(n) |
| Insert at middle | O(n) | O(1) |
| Delete at middle | O(n) | O(1) |
| Search by value | O(n) | O(n) |
| Memory layout | Contiguous | Scattered |

Linked lists trade random access for cheap insert/delete. The entire data structure is just nodes connected by \`.next\` pointers — everything else follows from that.`

### Key vocabulary

| Term | Meaning |
|---|---|
| **Root** | The top node — the entry point |
| **Leaf** | A node with no children |
| **Parent** | The node directly above |
| **Child** | A node directly below |
| **Height** | Longest path from root to a leaf |
| **Depth** | Distance from root to a given node |

---

### In C#, a node looks like this:

\`\`\`csharp
public class TreeNode {
    public int val;
    public TreeNode left;
    public TreeNode right;
    public TreeNode(int val = 0) { this.val = val; }
}
\`\`\`

Same idea as \`ListNode\` — but instead of one \`.next\`, you have \`.left\` and \`.right\`.

\`root\` is just a variable holding the address of the top node. Same as \`head\` for linked lists.

---

### How do you visit every node?

With a linked list you just follow \`.next\`. With a tree you have to choose — left first or right first?

There are three standard orders. We'll use this tree for all three:

**Rule:** go as far left as possible first. Visit. Then go right.

Step-by-step walk (inorder on root=4):

\`\`\`
Inorder(4)
  → Inorder(2)           go left of 4 first
      → Inorder(1)       go left of 2
          → Inorder(null)  hit null, return
          print 1        ← leftmost node, visited first
          → Inorder(null)  right of 1 = null, return
      print 2
      → Inorder(3)
          → Inorder(null)
          print 3
          → Inorder(null)
  print 4                ← root visited AFTER entire left side
  → Inorder(6)           now go right of 4
      → Inorder(5)
          print 5
      print 6
      → Inorder(7)
          print 7

Output: 1 2 3 4 5 6 7
\`\`\`

\`\`\`csharp
void Inorder(TreeNode node) {
    if (node == null) return;   // hit a leaf's child — turn back
    Inorder(node.left);         // recurse left first
    Console.Write(node.val);    // then visit this node
    Inorder(node.right);        // then recurse right
}
\`\`\`

---

### Preorder — node → left → right

**Rule:** visit the node FIRST, then recurse.

**Result: 4 → 2 → 1 → 3 → 6 → 5 → 7**

You're tracing the tree **top-down, left-biased** — root always comes out first.

Step-by-step:

\`\`\`
Preorder(4)
  print 4                ← root visited FIRST
  → Preorder(2)
      print 2
      → Preorder(1)
          print 1
      → Preorder(3)
          print 3
  → Preorder(6)
      print 6
      → Preorder(5)
          print 5
      → Preorder(7)
          print 7

Output: 4 2 1 3 6 5 7
\`\`\`

\`\`\`csharp
void Preorder(TreeNode node) {
    if (node == null) return;
    Console.Write(node.val);    // visit BEFORE going deeper
    Preorder(node.left);
    Preorder(node.right);
}
\`\`\`

---

### Postorder — left → right → node

**Rule:** visit the node LAST — only after both children are done.

**Result: 1 → 3 → 2 → 5 → 7 → 6 → 4**

Root (4) always comes out last.

\`\`\`csharp
void Postorder(TreeNode node) {
    if (node == null) return;
    Postorder(node.left);
    Postorder(node.right);
    Console.Write(node.val);    // visit AFTER both children
}
\`\`\`

---

### Easy way to remember all three

The **pre/in/post** prefix tells you **when the root is visited** relative to its children:

| Name | Root visited | Result on our tree |
|---|---|---|
| **Pre**order | **before** children | 4 2 1 3 6 5 7 |
| **In**order | **between** children | 1 2 3 4 5 6 7 |
| **Post**order | **after** children | 1 3 2 5 7 6 4 |

The base case \`if (node == null) return\` is the same in all three — every leaf's children are null, and hitting null is what stops the recursion.

---

### What is a Binary Search Tree (BST)?

A binary tree with one extra rule:

> **Left subtree values < node value < right subtree values**

\`\`\`
Looking for 5 in the BST above:

  at 3:  5 > 3 → go right
  at 5:  found ✓
\`\`\`

Same idea as binary search on an array — but on a tree.

---

### Summary

| | Linked List | Binary Tree | BST |
|---|---|---|---|
| Each node has | 1 pointer (next) | 2 pointers (left, right) | 2 pointers + ordering rule |
| Traversal | Follow .next | Recurse left + right | Same, but ordered |
| Search | O(n) | O(n) | O(log n) |`

    content: `## Graphs & Grid DFS

### What is a graph?

A graph is just **nodes connected by edges**. That's it. No rules about direction, no single root, no parent-child restriction.

\`\`\`
Tree (restricted graph):        Graph (no rules):
        1                        1 ── 2
       / \\                       |  \\ |
      2   3                      3 ── 4
\`\`\`

A tree IS a graph — just a special one with no cycles and one root. A graph is more general.

---

### Three ways the same idea appears in problems

| Form | What nodes are | What edges are |
|---|---|---|
| Explicit graph | numbered nodes | given connections |
| Grid | cells \`[row][col]\` | adjacent cells (up/down/left/right) |
| Implicit | states in a problem | valid transitions |

Number of Islands uses a **grid graph** — the most common form in LeetCode.

---

### A grid IS a graph

Every \`'1'\` cell is a node. Two cells are connected if they are adjacent horizontally or vertically.

\`\`\`
1 1 0 0
1 0 0 1
0 0 1 1
\`\`\`

As a graph:
\`\`\`
[0,0]─[0,1]        [0,3]
  |                  |
[1,0]           [2,2]─[2,3]
\`\`\`

Three separate connected components = **3 islands**.

---

### DFS on a grid

DFS = go as deep as possible before backtracking. On a grid: step onto a cell, then immediately visit all its neighbors, then their neighbors, etc.

**The key: mark cells visited as you go**, or you'll revisit them forever.

The standard trick for grids: overwrite \`'1'\` with \`'0'\` (or \`'#'\`) when you visit it. This kills it — you'll never count it again.

\`\`\`csharp
void DFS(char[][] grid, int r, int c) {
    // base case: out of bounds OR water OR already visited
    if (r < 0 || r >= grid.Length) return;
    if (c < 0 || c >= grid[0].Length) return;
    if (grid[r][c] != '1') return;

    grid[r][c] = '0';   // mark visited — flood fill

    DFS(grid, r + 1, c);   // down
    DFS(grid, r - 1, c);   // up
    DFS(grid, r, c + 1);   // right
    DFS(grid, r, c - 1);   // left
}
\`\`\`

This is the same structure as tree DFS — base case, then recurse on neighbors. Instead of \`left\` and \`right\`, you have 4 directions.

---

### The full Number of Islands algorithm

1. Scan every cell
2. When you find a \`'1'\` → new island, increment count, flood fill it
3. After flood fill, all connected \`'1'\`s are now \`'0'\` — won't be counted again

\`\`\`csharp
public int NumIslands(char[][] grid) {
    int count = 0;

    for (int r = 0; r < grid.Length; r++) {
        for (int c = 0; c < grid[0].Length; c++) {
            if (grid[r][c] == '1') {
                count++;
                DFS(grid, r, c);   // erase the whole island
            }
        }
    }

    return count;
}
\`\`\`

---

### Trace through an example

\`\`\`
1 1 0
0 0 1
\`\`\`

\`\`\`
Scan [0,0]: '1' → count=1, DFS floods:
  mark [0,0]='0', visit neighbors
  → [0,1]='1' → mark '0', visit neighbors
    → [0,2]='0' → stop
    → [1,1]='0' → stop
  → [1,0]='0' → stop

Grid is now:
0 0 0
0 0 1

Scan [0,1]: '0' → skip
Scan [0,2]: '0' → skip
Scan [1,0]: '0' → skip
Scan [1,1]: '0' → skip
Scan [1,2]: '1' → count=2, DFS floods [1,2]

Final count: 2
\`\`\`

---

### DFS vs BFS — which to use?

Both work for flood fill. The difference is order of traversal:

| | DFS | BFS |
|---|---|---|
| Goes | deep first | wide first |
| Uses | recursion (call stack) | queue |
| For islands | either works | either works |
| For shortest path | no | yes |

For counting islands, use DFS — it's simpler to write recursively.

---

### Common mistakes

**1. Forgetting to check bounds before accessing the cell:**
\`\`\`csharp
// CRASH — check bounds first
if (grid[r][c] != '1') return;          // wrong order
if (r < 0 || r >= grid.Length) return;  // must be first
\`\`\`

**2. Not marking visited — infinite loop:**
\`\`\`csharp
// Without grid[r][c] = '0', DFS calls itself forever
// [0,0] visits [0,1], [0,1] visits [0,0], [0,0] visits [0,1]...
\`\`\`

**3. Diagonal neighbors — the problem says horizontal/vertical only:**
\`\`\`csharp
// Do NOT include diagonals for Number of Islands
DFS(grid, r+1, c+1);  // wrong — diagonal
\`\`\`

---

### Summary

- A graph is nodes + edges. A grid is a graph where cells connect to adjacent neighbors.
- DFS on a grid = same pattern as tree DFS, but 4 directions instead of 2.
- Always mark cells visited before recursing, or you'll loop forever.
- Flood fill is just DFS that erases as it goes.`

### What problem does DP actually solve?

Before anything else — DP is not a data structure. It is not a trick. It is an observation about your problem that lets you avoid redundant computation.

That observation is: **you are solving the same subproblem multiple times.**

If that is not true about your problem, DP does not apply. If it is true, DP can collapse an exponential solution into a polynomial one.

---

### Start with recursion — see the waste

Take Fibonacci: \`fib(n) = fib(n-1) + fib(n-2)\`.

Plain recursion for \`fib(5)\`:

\`\`\`
fib(5)
  fib(4)
    fib(3)
      fib(2)
        fib(1) → 1
        fib(0) → 0
      fib(1) → 1
    fib(2)          ← computed AGAIN
      fib(1) → 1
      fib(0) → 0
  fib(3)            ← computed AGAIN
    fib(2)          ← computed AGAIN
      fib(1) → 1
      fib(0) → 0
    fib(1) → 1
\`\`\`

\`fib(2)\` is computed 3 times. \`fib(3)\` is computed 2 times. For \`fib(50)\`, \`fib(2)\` is computed billions of times. The tree of calls grows exponentially — O(2^n).

The waste is obvious: you already know the answer to \`fib(2)\` after computing it once. Why compute it again?

---

### The fix: remember answers you have already computed

This is called **memoization** (top-down DP).

The idea before any code: you need a lookup table that ALL recursive calls share. Not a local variable inside \`Fib\` — that would be a fresh empty table for every call. It must live OUTSIDE so every call reads from and writes to the same table.

\`fib(5)\` calls \`fib(3)\`. \`fib(4)\` also calls \`fib(3)\`. Both calls hit the same table:

\`\`\`
fib(3) runs first → computes answer → saves it in memo[3]
fib(3) runs again → sees memo[3] already has an answer → returns it instantly
\`\`\`

Without the shared table, \`fib(3)\` recomputes from scratch every time. With it, it computes once and every future call is a free lookup.

The \`-1\` is just a sentinel — a value that can never be a real Fibonacci answer — so you can tell the difference between "not computed yet" and a stored result.

Every call does exactly three things in this order:
1. Is this a base case? Return immediately.
2. Is \`memo[n]\` already filled? Return the stored answer.
3. Neither — compute it, save it in \`memo[n]\`, return it.

\`\`\`csharp
int[] memo = new int[n + 1];   // shared table — lives OUTSIDE Fib
Array.Fill(memo, -1);           // -1 = not computed yet

int Fib(int n) {
    if (n <= 1) return n;                          // 1. base case
    if (memo[n] != -1) return memo[n];             // 2. already computed
    memo[n] = Fib(n - 1) + Fib(n - 2);            // 3. compute and save
    return memo[n];
}
\`\`\`

Now \`fib(2)\` is computed exactly once. Every subsequent call hits the memo and returns instantly.

The call tree collapses from O(2^n) to O(n) — each value computed exactly once.

---

### Why is it called top-down?

Because you start at the top (the big problem) and recurse down toward the base cases, saving answers along the way.

You only compute what you actually need.

---

### The other approach: bottom-up (tabulation)

Instead of starting at the top and recursing, start at the base cases and build upward.

\`\`\`csharp
int[] dp = new int[n + 1];
dp[0] = 0;
dp[1] = 1;

for (int i = 2; i <= n; i++) {
    dp[i] = dp[i-1] + dp[i-2];   // use already-computed values
}

return dp[n];
\`\`\`

No recursion. No call stack. You fill a table from left to right, each cell depending only on previous cells.

\`\`\`
i:    0  1  2  3  4  5
dp:   0  1  1  2  3  5
\`\`\`

---

### Wait — what is actually "dynamic" about Dynamic Programming?

Honestly? The name is confusing and not very descriptive. Don't get hung up on it.

The real idea has a simpler name: **don't solve the same subproblem twice.**

Here is what happens WITHOUT DP for Climbing Stairs:

To find ways(5), you calculate ways(4) and ways(3).
To find ways(4), you calculate ways(3) and ways(2).

You calculated ways(3) **twice**. For large n, this explodes exponentially.

WITH DP (tabulation):

You calculate ways(3) **once**, store it in \`dp[3]\`, and just **look it up** every time you need it.

\`\`\`
Calculate once. Store it. Reuse it.
\`\`\`

That is the entire idea. The table is just the storage.

So "Dynamic Programming" really just means:
1. Your problem has **overlapping subproblems** (same thing gets calculated multiple times)
2. You **store the results** so you never repeat work

---

### Top-down vs bottom-up — what is the actual difference?

| | Top-down (memo) | Bottom-up (tabulation) |
|---|---|---|
| Direction | big problem to base cases | base cases to big problem |
| How | recursion + cache | loop + array |
| Computes | only what is needed | everything up to n |
| Stack overflow risk | yes (deep recursion) | no |
| Easier to write | usually | requires knowing fill order |

Both are DP. Both give the same answer. Choose based on which is easier to think about for a given problem.

---

### What makes a problem solvable with DP?

Two properties must hold:

**1. Overlapping subproblems** — the same smaller problem appears multiple times in the recursion tree. Fibonacci has this. Binary search does NOT — each subproblem is unique.

**2. Optimal substructure** — the optimal answer to the big problem can be built from optimal answers to subproblems.

Example of optimal substructure: the shortest path from A to C through B is the shortest path from A to B plus the shortest path from B to C. You do not need to know anything else about the full path.

If your problem has both properties, DP applies.

---

### The hardest part: defining the state

The state is what you store in your memo or dp array. Defining it correctly is the whole skill.

Ask yourself: **what information do I need to solve a subproblem uniquely?**

For Fibonacci: just \`n\`. So \`dp[n]\` is enough.

For a 2D grid problem: you need both row and column. So \`dp[r][c]\`.

For a knapsack problem: you need the item index AND the remaining capacity. So \`dp[i][w]\`.

The state defines the shape of your dp array. Get the state wrong and the whole solution breaks.

---

### The recurrence relation

Once you have the state, you need the formula: how does \`dp[i]\` depend on previous values?

This comes from asking: **if I know the answer to all smaller subproblems, how do I compute the current one?**

For Fibonacci:
\`\`\`
dp[i] = dp[i-1] + dp[i-2]
\`\`\`

For minimum cost to climb stairs:
\`\`\`
dp[i] = cost[i] + min(dp[i-1], dp[i-2])
\`\`\`

For longest common subsequence:
\`\`\`
if chars match:   dp[i][j] = dp[i-1][j-1] + 1
if chars differ:  dp[i][j] = max(dp[i-1][j], dp[i][j-1])
\`\`\`

The recurrence IS the algorithm. Everything else is bookkeeping.

---

### How to approach a DP problem step by step

1. **Write the brute force recursion first.** Do not think about DP yet. Just solve it recursively.
2. **Draw the recursion tree.** Find where the same subproblem appears more than once.
3. **Add a memo array.** Cache the result of each subproblem by its state.
4. **Optionally convert to bottom-up.** Fill a table in the order subproblems depend on each other.

If you cannot write the recursion, you cannot write the DP. The recursion IS the DP — just without the caching.

---

### Common mistake: jumping straight to the table

Many people see a DP problem and immediately try to fill a 2D table without understanding why. They copy a pattern without knowing what the cells mean.

Always know: **what does \`dp[i]\` (or \`dp[i][j]\`) represent in English?** If you cannot answer that in one sentence, you do not understand your own solution.

---

### Worked example: Coin Change

This is a better example than Fibonacci because the state is not immediately obvious.

**Problem:** given coins \`[1, 5, 10]\` and a target amount \`11\`, what is the minimum number of coins to make \`11\`?

**Step 1 — Write the recursion first.**

At each step you ask: if I pick coin \`c\`, what is the minimum coins needed for the remaining amount \`amount - c\`?

\`\`\`csharp
int MinCoins(int[] coins, int amount) {
    if (amount == 0) return 0;
    if (amount < 0) return int.MaxValue;

    int best = int.MaxValue;
    foreach (int c in coins) {
        int sub = MinCoins(coins, amount - c);
        if (sub != int.MaxValue)
            best = Math.Min(best, 1 + sub);
    }
    return best;
}
\`\`\`

This works but is exponential — \`MinCoins(amount=6)\` gets called dozens of times.

**Step 2 — Identify the state.**

What uniquely identifies a subproblem? Just the remaining \`amount\`. So \`memo[amount]\` is enough.

**Step 3 — Add memo (top-down).**

\`\`\`csharp
int[] memo = new int[amount + 1];
Array.Fill(memo, -1);

int MinCoins(int[] coins, int amount) {
    if (amount == 0) return 0;
    if (amount < 0) return int.MaxValue;
    if (memo[amount] != -1) return memo[amount];

    int best = int.MaxValue;
    foreach (int c in coins) {
        int sub = MinCoins(coins, amount - c);
        if (sub != int.MaxValue)
            best = Math.Min(best, 1 + sub);
    }
    memo[amount] = best;
    return best;
}
\`\`\`

**Step 4 — Convert to bottom-up.**

Fill \`dp[0]\` through \`dp[amount]\`. \`dp[i]\` = minimum coins to make amount \`i\`.

\`\`\`csharp
int[] dp = new int[amount + 1];
Array.Fill(dp, int.MaxValue);
dp[0] = 0;

for (int i = 1; i <= amount; i++) {
    foreach (int c in coins) {
        if (i - c >= 0 && dp[i - c] != int.MaxValue) {
            dp[i] = Math.Min(dp[i], 1 + dp[i - c]);
        }
    }
}

return dp[amount] == int.MaxValue ? -1 : dp[amount];
\`\`\`

Trace for coins = \`[1,5,10]\`, amount = \`11\`:

\`\`\`
dp[0]  = 0
dp[1]  = 1 + dp[0]  = 1        (use coin 1)
dp[5]  = min(1+dp[4], 1+dp[0]) = 1   (use coin 5)
dp[10] = 1                            (use coin 10)
dp[11] = min(1+dp[10], 1+dp[6]) = 2  (10+1)
\`\`\`

Answer: 2 coins. Correct.

Notice: \`dp[i]\` in English = "minimum coins to make exactly amount i". Always be able to say this.

---

### How to recognize a DP problem

These phrases in the problem statement are strong signals:

| Phrase | Example |
|---|---|
| "minimum number of..." | minimum coins to make amount |
| "maximum number of..." | maximum profit from stock prices |
| "count the number of ways..." | count paths from top-left to bottom-right |
| "can you reach / achieve..." | can you make this sum with these numbers |
| "longest / shortest subsequence..." | longest common subsequence |

Also look for: choices at each step where you pick one option and the rest of the problem is the same shape. That self-similarity is the recursion, and repeated subproblems means DP.

What does NOT suggest DP: problems where every subproblem is unique (binary search, most graph traversals), or where you just need one pass over the data.

---

### Space optimization

Many DP solutions use an array of size n but only ever look at the last 1 or 2 values.

Fibonacci only needs the previous two values:

\`\`\`csharp
// O(n) space
int[] dp = new int[n + 1];
dp[0] = 0; dp[1] = 1;
for (int i = 2; i <= n; i++) dp[i] = dp[i-1] + dp[i-2];
return dp[n];

// O(1) space — just keep the last two
int a = 0, b = 1;
for (int i = 2; i <= n; i++) {
    int c = a + b;
    a = b;
    b = c;
}
return b;
\`\`\`

When to optimize: after you have a working solution, check how far back your recurrence looks. If it only looks back a fixed number of steps, replace the array with that many variables.

Do not optimize space first. Get the table working, understand it, then optimize.

---

### Classic DP problems and why DP fits each one

| Problem | What varies | Why DP fits |
|---|---|---|
| Fibonacci | n | fib(3) needed by fib(4) and fib(5) — computed twice without memo |
| Climbing Stairs | current step | ways to reach step i = ways to reach i-1 + ways to reach i-2 — same overlap |
| Coin Change | remaining amount | MinCoins(6) called from MinCoins(7) and MinCoins(11) — same subproblem |
| House Robber | current house | rob(i) = max(skip i, rob i + rob(i-2)) — overlapping choices |
| Longest Common Subsequence | (i, j) index pair | LCS(i,j) needed by LCS(i+1,j) and LCS(i,j+1) — 2D overlap |
| 0/1 Knapsack | (item index, remaining capacity) | same item+capacity pair reached via different inclusion choices |
| Unique Paths (grid) | (row, col) | paths to (r,c) = paths to (r-1,c) + paths to (r,c-1) — shared cells |
| Word Break | start index in string | can_break(i) needed repeatedly from different earlier positions |

**Pattern to notice:** in every single one, the same subproblem is reached from multiple different places in the recursion. That is the signal. If you draw the recursion tree and see the same node appear more than once — DP will help.

---

### Summary

| Concept | What it means |
|---|---|
| Overlapping subproblems | same sub-calculation needed multiple times |
| Optimal substructure | big answer built from small optimal answers |
| Memoization | cache recursion results top-down |
| Tabulation | fill table bottom-up |
| State | what uniquely identifies a subproblem |
| Recurrence | formula relating current state to previous states |

DP = recursion + not repeating yourself.`

    content: `## Intervals

### What is an interval?

An interval is just a start and end point: [start, end].

Examples:
  [1, 3]  →  covers 1, 2, 3
  [2, 6]  →  covers 2, 3, 4, 5, 6
  [8, 10] →  covers 8, 9, 10

In code, intervals are usually given as a 2D array:
  [[1,3], [2,6], [8,10]]

---

### The one idea that unlocks ALL interval problems: sort by start time

Before doing anything else — always sort intervals by their start value.

Why? Because once sorted, you only ever need to compare the CURRENT
interval with the PREVIOUS one. You never need to look further back.

  Unsorted: [[2,6], [8,10], [1,3]]  →  hard to reason about
  Sorted:   [[1,3], [2,6], [8,10]]  →  easy to process left to right

---

### Do two intervals overlap?

Two intervals [a,b] and [c,d] overlap if:
  a <= d AND c <= b

Simpler rule when sorted by start (c >= a always):
  They overlap if c <= b  (new interval starts before previous one ends)

  [1, 3] and [2, 6] → 2 <= 3 → overlap ✓
  [1, 3] and [4, 6] → 4 <= 3 → NO overlap ✗

---

### How to merge two overlapping intervals?

If [1,3] and [2,6] overlap, the merged interval is:
  [min(1,2), max(3,6)] = [1, 6]

Always:
  merged start = min of both starts  (or just keep the earlier one if sorted)
  merged end   = max of both ends

---

### The 5 interval problems and what each one asks

| Problem | What it asks |
|---|---|
| LC 252 Meeting Rooms | Can one person attend ALL meetings? (any overlap → false) |
| LC 56 Merge Intervals | Collapse all overlapping intervals into one |
| LC 57 Insert Interval | Insert a new interval and merge if needed |
| LC 435 Non-overlapping | Min intervals to REMOVE so none overlap |
| LC 253 Meeting Rooms II | How many rooms needed? (max overlaps at once) |

---

### Pattern 1 — Check for ANY overlap (LC 252)

Sort by start. Walk through pairs. If any consecutive pair overlaps → false.

\`\`\`csharp
Array.Sort(intervals, (a, b) => a[0] - b[0]);
for (int i = 1; i < intervals.Length; i++) {
    if (intervals[i][0] < intervals[i-1][1])  // overlap!
        return false;
}
return true;
\`\`\`

---

### Pattern 2 — Merge all overlaps (LC 56)

Sort by start. Keep a "current" interval. If next overlaps, extend it.
If not, save current and start fresh.

\`\`\`csharp
Array.Sort(intervals, (a, b) => a[0] - b[0]);
var result = new List<int[]>();
int[] current = intervals[0];

for (int i = 1; i < intervals.Length; i++) {
    if (intervals[i][0] <= current[1]) {
        current[1] = Math.Max(current[1], intervals[i][1]); // extend
    } else {
        result.Add(current);   // no overlap, save and move on
        current = intervals[i];
    }
}
result.Add(current);
\`\`\`

---

### Pattern 3 — Minimum removals (LC 435)

Sort by END time. Greedily keep intervals that end earliest.
Every time you cannot keep one, that is a removal.

\`\`\`csharp
Array.Sort(intervals, (a, b) => a[1] - b[1]);  // sort by END
int removals = 0;
int end = intervals[0][1];

for (int i = 1; i < intervals.Length; i++) {
    if (intervals[i][0] < end) {
        removals++;  // overlap — remove this one
    } else {
        end = intervals[i][1];  // no overlap — keep it
    }
}
return removals;
\`\`\`

---

### Pattern 4 — How many rooms needed? (LC 253)

Use a min-heap of end times. For each meeting, if the earliest-ending
room is free (its end <= current start), reuse it. Otherwise add a room.

\`\`\`csharp
Array.Sort(intervals, (a, b) => a[0] - b[0]);
var heap = new PriorityQueue<int,int>();
foreach (var interval in intervals) {
    if (heap.Count > 0 && heap.Peek() <= interval[0])
        heap.Dequeue();  // reuse room
    heap.Enqueue(interval[1], interval[1]);
}
return heap.Count;
\`\`\`

---

### The mental checklist for any interval problem

1. Sort by start time (almost always)
2. Walk left to right comparing current with previous
3. Overlapping? → merge, remove, or count
4. Not overlapping? → save and move on

---

### Key facts to remember

| Fact | Detail |
|---|---|
| Overlap check (sorted) | intervals[i][0] < intervals[i-1][1] |
| Merge end | Math.Max(current end, new end) |
| Sort by start | most problems |
| Sort by end | greedy removal (LC 435) |
| Min-heap of ends | counting rooms (LC 253) |
`

### What is backtracking?

Backtracking is **DFS on a decision tree you never explicitly build**.

At each step you make a choice, go deeper, and when you've exhausted that path you **undo** the choice and try the next one. The call stack silently tracks your position in the tree.

---

### The universal template

\`\`\`
dfs(state):
  if base case:
    record result
    return

  for each choice:
    make choice       ← add to current
    dfs(next state)   ← go deeper
    undo choice       ← remove from current  ← THIS IS THE BACKTRACK
\`\`\`

The **undo** is what makes it backtracking. Without it, every branch shares corrupted state.

---

### LC 78 — Subsets (the clearest example)

**Problem:** given \`[1,2,3]\`, return all possible subsets.

Every element has exactly two choices: **include** or **skip**. That binary decision for each element forms a tree:

\`\`\`
                    []
              /           \\
           []              [1]
          /    \\          /    \\
        []    [2]      [1]    [1,2]
        / \\   / \\      / \\    /   \\
      [] [3][2][2,3] [1][1,3][1,2][1,2,3]
\`\`\`

8 leaves = 8 subsets = 2³.

---

### The code — read this first

\`\`\`csharp
public IList<IList<int>> Subsets(int[] nums) {
    var result  = new List<IList<int>>();
    var current = new List<int>();

    void dfs(int i) {

        // ─── BASE CASE ────────────────────────────────────────────────────
        if (i == nums.Length) {
            result.Add(new List<int>(current)); // copy current — don't store the reference
            return;
        }

        // ─── ATTEMPT 1: skip nums[i] ─────────────────────────────────────
        // Don't touch current. Just recurse and explore the skip subtree.
        dfs(i + 1);

        // ─── ATTEMPT 2: include nums[i] ──────────────────────────────────
        current.Add(nums[i]);   // open bracket  — add to end of current
        dfs(i + 1);             //               — explore the include subtree
        current.RemoveAt(current.Count - 1); // close bracket — undo the Add above
        // (Count-1 = last index, because Add always goes to the end)
        // After this line, current is exactly what it was before ATTEMPT 2.
        // The caller gets it back clean.
    }

    dfs(0);
    return result;
}
\`\`\`

---

### The call stack IS the data structure

You don't build this tree in memory. The recursion simulates it. **Stack depth = index i.** \`current[]\` just makes the path visible — it grows as you go deeper, shrinks as frames pop.

When \`dfs(2)\` returns, \`dfs(1)\` resumes exactly where it left off and tries the other branch.

---

### Full call stack trace on [1,2,3]

\`\`\`
CALL dfs(0)  current=[]
  CALL dfs(1)  current=[]          stack: [dfs(0), dfs(1)]
    CALL dfs(2)  current=[]        stack: [dfs(0), dfs(1), dfs(2)]
      CALL dfs(3)  current=[]      stack: [dfs(0), dfs(1), dfs(2), dfs(3)]
        BASE → record []
      RETURN dfs(3)                stack: [dfs(0), dfs(1), dfs(2)]
      push(3) → current=[3]
      CALL dfs(3)  current=[3]     stack: [dfs(0), dfs(1), dfs(2), dfs(3)]
        BASE → record [3]
      RETURN dfs(3)                stack: [dfs(0), dfs(1), dfs(2)]
      pop() → current=[]
    RETURN dfs(2)                  stack: [dfs(0), dfs(1)]
    push(2) → current=[2]
    CALL dfs(2)  current=[2]       stack: [dfs(0), dfs(1), dfs(2)]
      CALL dfs(3)  current=[2]     stack: [dfs(0), dfs(1), dfs(2), dfs(3)]
        BASE → record [2]
      RETURN dfs(3)                stack: [dfs(0), dfs(1), dfs(2)]
      push(3) → current=[2,3]
      CALL dfs(3)  current=[2,3]   stack: [dfs(0), dfs(1), dfs(2), dfs(3)]
        BASE → record [2,3]
      RETURN dfs(3)                stack: [dfs(0), dfs(1), dfs(2)]
      pop() → current=[2]
    RETURN dfs(2)                  stack: [dfs(0), dfs(1)]
    pop() → current=[]
  RETURN dfs(1)                    stack: [dfs(0)]
  push(1) → current=[1]
  CALL dfs(1)  current=[1]         stack: [dfs(0), dfs(1)]
    CALL dfs(2)  current=[1]       stack: [dfs(0), dfs(1), dfs(2)]
      CALL dfs(3)  current=[1]     stack: [dfs(0), dfs(1), dfs(2), dfs(3)]
        BASE → record [1]
      RETURN dfs(3)                stack: [dfs(0), dfs(1), dfs(2)]
      push(3) → current=[1,3]
      CALL dfs(3)  current=[1,3]   stack: [dfs(0), dfs(1), dfs(2), dfs(3)]
        BASE → record [1,3]
      RETURN dfs(3)                stack: [dfs(0), dfs(1), dfs(2)]
      pop() → current=[1]
    RETURN dfs(2)                  stack: [dfs(0), dfs(1)]
    push(2) → current=[1,2]
    CALL dfs(2)  current=[1,2]     stack: [dfs(0), dfs(1), dfs(2)]
      CALL dfs(3)  current=[1,2]   stack: [dfs(0), dfs(1), dfs(2), dfs(3)]
        BASE → record [1,2]
      RETURN dfs(3)                stack: [dfs(0), dfs(1), dfs(2)]
      push(3) → current=[1,2,3]
      CALL dfs(3)  current=[1,2,3] stack: [dfs(0), dfs(1), dfs(2), dfs(3)]
        BASE → record [1,2,3]
      RETURN dfs(3)                stack: [dfs(0), dfs(1), dfs(2)]
      pop() → current=[1,2]
    RETURN dfs(2)                  stack: [dfs(0), dfs(1)]
    pop() → current=[1]
  RETURN dfs(1)                    stack: [dfs(0)]
  pop() → current=[]
\`\`\`

Result: \`[], [3], [2], [2,3], [1], [1,3], [1,2], [1,2,3]\`

\`[]\` recorded exactly **once** — the first path where you skipped everything.

---

### The snapshot problem

\`current\` keeps changing as you push/pop. \`result.Add(current)\` stores a **reference** — when \`current\` changes later, your stored entry changes too.

Always copy at the moment you record:

\`\`\`csharp
result.Add(new List<int>(current));  // ✓ copy
\`\`\`

---

### Complexity

| | |
|---|---|
| Time | O(n × 2ⁿ) — 2ⁿ subsets, each costs O(n) to copy |
| Space | O(n) — recursion depth only, not counting output |

---

    content: `## Heap / Priority Queue

### What is a heap?

A heap is a data structure that always gives you the **min or max element in O(1)**, and lets you add/remove elements in **O(log n)**.

Think of it as a queue, but instead of first-in-first-out, the **element you care about most always comes out first** — smallest in a min-heap, largest in a max-heap.

---

### Two types

**Min-heap** — smallest element is always at the top.
**Max-heap** — largest element is always at the top.

C# has \`PriorityQueue<TElement, TPriority>\` — it is a **min-heap** by default (lowest priority number = dequeued first).

---

### When do you use a heap?

Any time you repeatedly need the smallest or largest element from a changing collection.

Classic signals:
- "find the kth largest/smallest"
- "find the top k elements"
- "merge k sorted lists"
- "find the median of a stream"

---

### What is priority?

Priority is just a number you assign that tells the heap **which element should come out first**. The element with the lowest priority number always comes out first.

You decide what priority means for your problem by asking: "which element do I want next?"

- Want the **smallest number** out first? → priority = the number itself
- Want the **largest number** out first? → priority = negative of the number
- Want the **shortest string** out first? → priority = string length
- Want the **most frequent** element out first? → priority = negative of frequency

Whatever you want out first — give it the lowest priority number.

---

### C# syntax

\`\`\`csharp
// min-heap — smallest priority comes out first
var minHeap = new PriorityQueue<int, int>();
minHeap.Enqueue(value, priority);
int top = minHeap.Peek();      // look at top, don't remove
int top = minHeap.Dequeue();   // remove and return top
int size = minHeap.Count;
\`\`\`

For a **max-heap**, negate the priority:
\`\`\`csharp
minHeap.Enqueue(value, -value);  // negate = max-heap trick
\`\`\`

---

### The Kth Largest pattern

"Kth largest" = maintain a **min-heap of size k**.

Why min-heap? Because the top of a min-heap of size k is always the kth largest element seen so far.

\`\`\`
for each number:
    add to heap
    if heap size > k:
        remove the smallest (top of min-heap)

answer = heap.Peek()  ← kth largest
\`\`\`

Example: nums = [3,2,1,5,6,4], k = 2

\`\`\`
add 3 → heap: [3]
add 2 → heap: [2,3]
add 1 → heap: [2,3] → size > 2 → remove 1 → heap: [2,3]  wait...
\`\`\`

Actually step by step:
\`\`\`
add 3 → [3],         size=1
add 2 → [2,3],       size=2
add 1 → [1,2,3],     size=3 > 2 → remove min(1) → [2,3]
add 5 → [2,3,5],     size=3 > 2 → remove min(2) → [3,5]
add 6 → [3,5,6],     size=3 > 2 → remove min(3) → [5,6]
add 4 → [4,5,6],     size=3 > 2 → remove min(4) → [5,6]

Peek() = 5  ← 2nd largest ✓
\`\`\`

---

### Full solution for LC 215

\`\`\`csharp
public int FindKthLargest(int[] nums, int k) {
    var minHeap = new PriorityQueue<int, int>();

    foreach (int n in nums) {
        minHeap.Enqueue(n, n);
        if (minHeap.Count > k)
            minHeap.Dequeue();  // remove smallest
    }

    return minHeap.Peek();  // kth largest
}
\`\`\`

---

### Time and space complexity

| Operation | Complexity |
|---|---|
| Enqueue | O(log n) |
| Dequeue | O(log n) |
| Peek | O(1) |
| Overall for kth largest | O(n log k) |

Space: O(k) — heap never grows beyond k elements.

---

### Why not just sort?

Sorting is O(n log n). The heap approach is O(n log k), which is faster when k is small. More importantly, the heap approach works when data is **streaming** — you don't need all elements upfront.

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────────
function buildSidebar(items) {
  const list = document.getElementById("concept-list");
  list.innerHTML = "";

  const byCategory = {};
  items.forEach(c => {
    if (!byCategory[c.category]) byCategory[c.category] = [];
    byCategory[c.category].push(c);
  });

  Object.entries(byCategory).forEach(([cat, concepts]) => {
    const label = document.createElement("div");
    label.className = "category-label";
    label.textContent = cat;
    list.appendChild(label);

    concepts.forEach(c => {
      const item = document.createElement("div");
      item.className = "concept-item" + (activeId === c.id ? " active" : "");
      item.dataset.id = c.id;
      item.onclick = () => selectConcept(c.id);

      const tagClass = c.tag === "ds" ? "tag-ds" : c.tag === "alg" ? "tag-alg" : "tag-new";
      const tagLabel = c.tag === "ds" ? "DS" : c.tag === "alg" ? "Algo" : "New";

      item.innerHTML = `
        <span class="concept-icon">${c.icon}</span>
        <span class="concept-name">${c.name}</span>
        <span class="concept-tag ${tagClass}">${tagLabel}</span>
      `;
      list.appendChild(item);
    });
  });
}

// ── SELECT & RENDER CONCEPT ───────────────────────────────────────────────────
let activeId = null;

function selectConcept(id) {
  const concept = CONCEPTS.find(c => c.id === id);
  if (!concept) return;

  activeId = id;
  buildSidebar(filteredConcepts());

  const placeholder = document.getElementById("placeholder");
  const content = document.getElementById("content");

  placeholder.classList.add("hidden");
  content.classList.remove("hidden");
  content.innerHTML = marked.parse(concept.content);
  document.getElementById("main").scrollTop = 0;
}

// ── SEARCH / FILTER ───────────────────────────────────────────────────────────
function filteredConcepts() {
  const q = (document.getElementById("search").value || "").toLowerCase().trim();
  if (!q) return CONCEPTS;
  return CONCEPTS.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.category.toLowerCase().includes(q) ||
    c.content.toLowerCase().includes(q)
  );
}

function filterConcepts(val) {
  buildSidebar(filteredConcepts());
}

// ── KEYBOARD SHORTCUT: / to focus search ─────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== document.getElementById("search")) {
    e.preventDefault();
    document.getElementById("search").focus();
  }
  if (e.key === "Escape") {
    document.getElementById("search").value = "";
    filterConcepts("");
    document.getElementById("search").blur();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
buildSidebar(CONCEPTS);
</script>
<script>
// ── BACKTRACKING STEP-THROUGH VISUALIZER ─────────────────────────────────────
(function () {
  var NS = 'http://www.w3.org/2000/svg';
  var C = { bg:'#12121a', dim:'#1a1a2a', border:'#2e2e38', muted:'#3f3f52',
            text:'#7070a0', accent:'#a78bfa', green:'#34d399', yellow:'#fbbf24',
            pathbg:'#16122a', activebg:'#1f1a08' };

  var NP = {
    n0:  {x:340,y:32, r:22, lbl:'i=0', sub:'[]'},
    n1l: {x:170,y:112,r:18, lbl:'i=1', sub:'[]'},
    n1r: {x:510,y:112,r:18, lbl:'i=1', sub:'[1]'},
    n2ll:{x:85, y:190,r:15, lbl:'i=2', sub:'[]'},
    n2lr:{x:255,y:190,r:15, lbl:'i=2', sub:'[2]'},
    n2rl:{x:425,y:190,r:15, lbl:'i=2', sub:'[1]'},
    n2rr:{x:595,y:190,r:15, lbl:'i=2', sub:'[1,2]'},
    f0:  {x:42, y:272,r:12, lbl:'BASE',sub:'[]',    leaf:true},
    f1:  {x:127,y:272,r:12, lbl:'BASE',sub:'[3]',   leaf:true},
    f2:  {x:212,y:272,r:12, lbl:'BASE',sub:'[2]',   leaf:true},
    f3:  {x:297,y:272,r:12, lbl:'BASE',sub:'[2,3]', leaf:true},
    f4:  {x:382,y:272,r:12, lbl:'BASE',sub:'[1]',   leaf:true},
    f5:  {x:467,y:272,r:12, lbl:'BASE',sub:'[1,3]', leaf:true},
    f6:  {x:552,y:272,r:12, lbl:'BASE',sub:'[1,2]', leaf:true},
    f7:  {x:637,y:272,r:12, lbl:'BASE',sub:'[1,2,3]',leaf:true}
  };

  var EDGES = [
    ['n0','n1l','skip 1',false],['n0','n1r','+1',true],
    ['n1l','n2ll','skip 2',false],['n1l','n2lr','+2',true],
    ['n1r','n2rl','skip 2',false],['n1r','n2rr','+2',true],
    ['n2ll','f0','skip',false],['n2ll','f1','+3',true],
    ['n2lr','f2','skip',false],['n2lr','f3','+3',true],
    ['n2rl','f4','skip',false],['n2rl','f5','+3',true],
    ['n2rr','f6','skip',false],['n2rr','f7','+3',true]
  ];

  var PAR = {n1l:'n0',n1r:'n0',n2ll:'n1l',n2lr:'n1l',n2rl:'n1r',n2rr:'n1r',
             f0:'n2ll',f1:'n2ll',f2:'n2lr',f3:'n2lr',f4:'n2rl',f5:'n2rl',f6:'n2rr',f7:'n2rr'};

  var STEPS = [
    {nd:'n0',  stk:['dfs(0)'],                              cur:'[]',      act:'Start — i=0. Will we include nums[0]=1?',              rec:null},
    {nd:'n1l', stk:['dfs(0)','dfs(1)'],                    cur:'[]',      act:'① Skip 1 — call dfs(1) without touching current',      rec:null},
    {nd:'n2ll',stk:['dfs(0)','dfs(1)','dfs(2)'],           cur:'[]',      act:'① Skip 2 — call dfs(2) without touching current',      rec:null},
    {nd:'f0',  stk:['dfs(0)','dfs(1)','dfs(2)','dfs(3)'],  cur:'[]',      act:'① Skip 3 → i==3 BASE CASE → record snapshot []',      rec:'[]'},
    {nd:'f1',  stk:['dfs(0)','dfs(1)','dfs(2)','dfs(3)'],  cur:'[3]',     act:'② push(3) → include 3 → BASE CASE → record [3]',      rec:'[3]'},
    {nd:'n2lr',stk:['dfs(0)','dfs(1)','dfs(2)'],           cur:'[2]',     act:'③ pop(3) UNDO · ② push(2) include 2 → call dfs(2)',   rec:null},
    {nd:'f2',  stk:['dfs(0)','dfs(1)','dfs(2)','dfs(3)'],  cur:'[2]',     act:'① Skip 3 → BASE CASE → record [2]',                   rec:'[2]'},
    {nd:'f3',  stk:['dfs(0)','dfs(1)','dfs(2)','dfs(3)'],  cur:'[2,3]',   act:'② push(3) → include 3 → BASE CASE → record [2,3]',    rec:'[2,3]'},
    {nd:'n1r', stk:['dfs(0)','dfs(1)'],                    cur:'[1]',     act:'③ pop(3) UNDO · pop(2) UNDO · ② push(1) include 1',   rec:null},
    {nd:'n2rl',stk:['dfs(0)','dfs(1)','dfs(2)'],           cur:'[1]',     act:'① Skip 2 — call dfs(2) without touching current',      rec:null},
    {nd:'f4',  stk:['dfs(0)','dfs(1)','dfs(2)','dfs(3)'],  cur:'[1]',     act:'① Skip 3 → BASE CASE → record [1]',                   rec:'[1]'},
    {nd:'f5',  stk:['dfs(0)','dfs(1)','dfs(2)','dfs(3)'],  cur:'[1,3]',   act:'② push(3) → include 3 → BASE CASE → record [1,3]',    rec:'[1,3]'},
    {nd:'n2rr',stk:['dfs(0)','dfs(1)','dfs(2)'],           cur:'[1,2]',   act:'③ pop(3) UNDO · ② push(2) include 2 → call dfs(2)',   rec:null},
    {nd:'f6',  stk:['dfs(0)','dfs(1)','dfs(2)','dfs(3)'],  cur:'[1,2]',   act:'① Skip 3 → BASE CASE → record [1,2]',                 rec:'[1,2]'},
    {nd:'f7',  stk:['dfs(0)','dfs(1)','dfs(2)','dfs(3)'],  cur:'[1,2,3]', act:'② push(3) → include 3 → BASE CASE → record [1,2,3]',  rec:'[1,2,3]'}
  ];

  var _step = 0;

  function mk(tag, attrs, txt) {
    var el = document.createElementNS(NS, tag);
    if (attrs) { for (var k in attrs) el.setAttribute(k, String(attrs[k])); }
    if (txt !== undefined) el.textContent = txt;
    return el;
  }

  function pathSet(nodeId) {
    var s = {}; var n = nodeId;
    while (n) { s[n] = true; n = PAR[n]; }
    return s;
  }

  function draw(svg) {
    svg.innerHTML = '';
    // Level labels
    var levels = [[32,'i=0'],[112,'i=1'],[190,'i=2'],[272,'i=3 → BASE']];
    for (var li = 0; li < levels.length; li++) {
      svg.appendChild(mk('text',{x:4,y:levels[li][0]+4,'font-size':8,fill:C.muted,'font-family':'Inter,sans-serif','font-weight':'700'},levels[li][1]));
    }
    // Edges
    for (var ei = 0; ei < EDGES.length; ei++) {
      var e = EDGES[ei]; var fp = NP[e[0]]; var tp = NP[e[1]]; var isR = e[3];
      svg.appendChild(mk('line',{x1:fp.x,y1:fp.y,x2:tp.x,y2:tp.y,stroke:C.border,'stroke-width':1.5,id:'btv-e-'+e[0]+'-'+e[1]}));
      var mx = (fp.x+tp.x)/2; var my = (fp.y+tp.y)/2;
      var ox = isR ? 14 : -14;
      svg.appendChild(mk('text',{x:mx+ox,y:my+3,'font-size':8,fill:C.muted,'font-family':'JetBrains Mono,monospace','text-anchor':'middle',id:'btv-el-'+e[0]+'-'+e[1]},e[2]));
    }
    // Nodes
    var ids = Object.keys(NP);
    for (var ni = 0; ni < ids.length; ni++) {
      var id = ids[ni]; var p = NP[id];
      var g = mk('g',{id:'btv-g-'+id});
      g.appendChild(mk('circle',{cx:p.x,cy:p.y,r:p.r,fill:C.bg,stroke:C.border,'stroke-width':1.5,id:'btv-c-'+id}));
      g.appendChild(mk('text',{x:p.x,y:p.y+3,'font-size':p.leaf?7:8,'font-family':'JetBrains Mono,monospace',fill:C.muted,'text-anchor':'middle',id:'btv-il-'+id},p.lbl));
      g.appendChild(mk('text',{x:p.x,y:p.y+p.r+11,'font-size':p.leaf?9:8,'font-family':'JetBrains Mono,monospace',fill:p.leaf?'#4a4a62':C.text,'text-anchor':'middle','font-weight':p.leaf?'600':'400',id:'btv-sl-'+id},p.sub));
      svg.appendChild(g);
    }
  }

  function render() {
    var svg = document.getElementById('btv-svg');
    if (!svg) return;
    if (!svg.children.length) draw(svg);

    var s = STEPS[_step];
    var path = pathSet(s.nd);

    // Compute recorded leaves up to this step
    var recLeaves = {};
    for (var i = 0; i <= _step; i++) {
      if (STEPS[i].rec !== null) recLeaves[STEPS[i].nd] = true;
    }

    // Build active edge set
    var activeEdges = {};
    var nn = s.nd;
    while (PAR[nn]) { activeEdges[PAR[nn]+'-'+nn] = true; nn = PAR[nn]; }

    // Update edges
    for (var ei = 0; ei < EDGES.length; ei++) {
      var e = EDGES[ei]; var key = e[0]+'-'+e[1];
      var el = document.getElementById('btv-e-'+key);
      if (!el) continue;
      var on = activeEdges[key];
      el.setAttribute('stroke', on ? C.accent : C.border);
      el.setAttribute('stroke-width', on ? 2 : 1.5);
      el.setAttribute('stroke-opacity', on ? '1' : '0.5');
      var lbl = document.getElementById('btv-el-'+key);
      if (lbl) lbl.setAttribute('fill', on ? C.accent : C.muted);
    }

    // Update nodes
    var ids = Object.keys(NP);
    for (var ni = 0; ni < ids.length; ni++) {
      var id = ids[ni]; var p = NP[id];
      var circ = document.getElementById('btv-c-'+id);
      var ilbl = document.getElementById('btv-il-'+id);
      var slbl = document.getElementById('btv-sl-'+id);
      if (!circ) continue;
      var isActive = id === s.nd;
      var isOnPath = path[id] && !isActive;
      var isDoneLeaf = p.leaf && recLeaves[id] && !isActive;

      circ.setAttribute('fill', isActive ? C.activebg : isDoneLeaf ? '#0a1f14' : isOnPath ? C.pathbg : C.bg);
      circ.setAttribute('stroke', isActive ? C.yellow : isDoneLeaf ? C.green : isOnPath ? C.accent : C.border);
      circ.setAttribute('stroke-width', isActive ? 3 : (isDoneLeaf || isOnPath) ? 2 : 1.5);
      if (ilbl) ilbl.setAttribute('fill', isActive ? C.yellow : isDoneLeaf ? C.green : isOnPath ? C.accent : C.muted);
      if (slbl) {
        slbl.setAttribute('fill', isActive ? C.yellow : isDoneLeaf ? C.green : p.leaf ? '#4a4a62' : C.text);
        slbl.setAttribute('font-weight', isActive ? '700' : isDoneLeaf ? '600' : '400');
      }
    }

    // Info panel
    var stackEl = document.getElementById('btv-stack-display');
    var curEl   = document.getElementById('btv-cur-display');
    var resEl   = document.getElementById('btv-res-display');
    var actEl   = document.getElementById('btv-action-display');
    var numEl   = document.getElementById('btv-num-display');

    if (stackEl) {
      var html = '';
      for (var si = 0; si < s.stk.length; si++) {
        var isTop = si === s.stk.length - 1;
        html += '<div style="color:' + (isTop ? C.accent : '#505080') + ';padding-left:' + (si * 10) + 'px;font-size:11px">' + s.stk[si] + (isTop ? ' ←' : '') + '</div>';
      }
      stackEl.innerHTML = html;
    }
    if (curEl)  curEl.textContent  = s.cur;
    if (actEl)  actEl.textContent  = s.act;
    if (numEl)  numEl.textContent  = 'Step ' + (_step + 1) + ' / ' + STEPS.length;
    if (resEl) {
      var recs = [];
      for (var ri = 0; ri <= _step; ri++) { if (STEPS[ri].rec !== null) recs.push(STEPS[ri].rec); }
      resEl.innerHTML = recs.map(function(r){ return '<span style="color:' + C.green + '">' + r + '</span>'; }).join('  ');
    }
  }

  window.btvStep = function (dir) {
    var svg = document.getElementById('btv-svg');
    if (!svg) return;
    if (!svg.children.length) { _step = 0; draw(svg); }
    _step = Math.max(0, Math.min(STEPS.length - 1, _step + dir));
    render();
  };

  // Auto-init when element enters DOM
  var obs = new MutationObserver(function () {
    var svg = document.getElementById('btv-svg');
    if (svg && !svg.children.length) { _step = 0; draw(svg); render(); }
  });
  obs.observe(document.body, {childList: true, subtree: true});
})();
